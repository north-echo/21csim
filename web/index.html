<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>21csim — The 21st Century Simulator</title>
  <meta name="description" content="What if history had gone differently? Watch 10,000 alternate centuries unfold.">
  <meta property="og:title" content="21csim — The 21st Century Simulator">
  <meta property="og:description" content="What if history had gone differently? Watch 10,000 alternate centuries unfold.">
  <meta property="og:image" content="/og/default.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="21csim — The 21st Century Simulator">
  <meta name="twitter:description" content="What if history had gone differently?">
  <meta name="twitter:image" content="/og/default.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#timeline-panel" class="skip-link">Skip to main content</a>
  <nav id="site-nav"></nav>
  <div id="app">
    <!-- Top Bar -->
    <header id="top-bar" role="banner">
      <div id="run-info">
        <span class="headline" style="color: var(--text-dim);">No run loaded</span>
      </div>
      <div class="actions">
        <button class="ctrl-btn" id="dashboard-toggle" aria-label="Toggle dashboard panel" aria-expanded="false">Dashboard</button>
        <button class="ctrl-btn" id="btn-select-run" aria-label="Open run selector">Runs</button>
      </div>
    </header>

    <!-- Main Area -->
    <main id="main-area" role="main">
      <div id="timeline-panel" aria-live="polite" aria-label="Simulation timeline" tabindex="-1">
        <div id="empty-state" role="status">
          <div class="icon" aria-hidden="true">&#x1F30D;</div>
          <div class="msg">21st Century Counterfactual Simulator</div>
          <div class="hint">Select a run to begin playback</div>
        </div>
      </div>
      <aside id="dashboard-panel" role="complementary" aria-label="World state dashboard"></aside>
    </main>

    <!-- Bottom Controls -->
    <div id="controls-bar" role="toolbar" aria-label="Playback controls"></div>
  </div>

  <!-- Run Selector Overlay -->
  <div id="selector-overlay" role="dialog" aria-label="Run selector" aria-modal="true"></div>

  <!-- Summary Overlay -->
  <div id="summary-overlay" role="dialog" aria-label="Run summary" aria-modal="true">
    <div id="summary-modal"></div>
  </div>

  <script type="module" src="app.js"></script>
  <script>
    // Dashboard toggle for mobile
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('dashboard-toggle');
      const panel = document.getElementById('dashboard-panel');
      if (toggle && panel) {
        toggle.addEventListener('click', () => {
          const isVisible = panel.classList.toggle('mobile-visible');
          toggle.setAttribute('aria-expanded', String(isVisible));
        });
      }
    });
  </script>
</body>
</html>
