id: "2049_latin_integration"
year_month: "2049-01"
title: "Latin American Integration"
description: >
  Brazilian President Isabela Ferreira-Santos and Argentine President Mateo
  Giordano sign the Montevideo Declaration proposing a 'Union of South American
  Nations' with shared currency, open borders, and integrated energy grids.
  Chile, Colombia, and Peru express interest; Venezuela, under its seventh
  strongman since Chavez, abstains. The US watches nervously from Washington.
domain: "regional"
confidence: "MEDIUM"
variable: "latin_integration_status"
