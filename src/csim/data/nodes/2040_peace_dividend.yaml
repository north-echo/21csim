id: "2040_peace_dividend"
year_month: "2040-01"
title: "The Peace Dividend"
description: >
  A world without Iraq, without Ukraine, without major conflict
  has trillions of dollars and millions of lives to spend on
  something else. But peace is also boring, and bored great
  powers find new competitions.
domain: "geopolitical"
confidence: "LOW"
variable: "peace_dividend_status"
distribution:
  type: "categorical"
  options:
    space_race_2: 0.25
    development_boom: 0.25
    technology_race: 0.20
    complacent_decline: 0.15
    new_cold_war: 0.15
dependencies: []
conditional: "conflict_deaths < 100000 AND nuclear_risk_level < 0.10"
outcomes:
  space_race_2:
    status: "DIVERGENCE"
    description: "Great power competition redirected to space; Moon bases, Mars missions, asteroid mining"
    explanation: "Military budgets repurposed for space; national prestige drives a second Space Age"
    world_state_effects:
      space_development_index: "+0.15"
      global_gdp_growth_modifier: "*1.02"
      us_global_standing: "+0.05"
      china_power_index: "+0.03"
      human_augmentation_prevalence: "+0.02"
      renewable_energy_share: "+0.03"
  development_boom:
    status: "DIVERGENCE"
    description: "Peace dividend invested in Global South; unprecedented development in Africa and South Asia"
    explanation: "Trillions redirected from defense to development; infrastructure, education, and healthcare transform developing world"
    world_state_effects:
      africa_development_index: "+0.15"
      india_power_index: "+0.08"
      global_gdp_growth_modifier: "*1.04"
      inequality_index: "-0.08"
      global_population_billions: "+0.3"
      food_security_index: "+0.05"
  technology_race:
    status: "DIVERGENCE"
    description: "AI, biotech, and quantum computing become the new arenas of great power competition"
    explanation: "Without military conflict, nations compete through technological supremacy; rapid breakthroughs follow"
    world_state_effects:
      ai_development_year_offset: "+1"
      human_augmentation_prevalence: "+0.05"
      global_gdp_growth_modifier: "*1.03"
      automation_displacement: "+0.10"
      internet_freedom_index: "-0.03"
      surveillance_state_index: "+0.05"
  complacent_decline:
    status: "DIVERGENCE"
    description: "No external threat breeds internal rot; institutions decay, populism rises"
    explanation: "Without a unifying enemy, democracies lose cohesion; social media fills the conflict void domestically"
    world_state_effects:
      us_polarization: "+0.08"
      eu_cohesion: "-0.05"
      global_democracy_index: "-0.04"
      us_institutional_trust: "-0.06"
      misinformation_severity: "+0.05"
      us_unity_index: "-0.05"
  new_cold_war:
    status: "ESCALATED"
    description: "Economic competition between US and China escalates into a new Cold War"
    explanation: "Trade wars, technology bans, and alliance systems harden into bloc competition"
    world_state_effects:
      nuclear_risk_level: "+0.05"
      china_power_index: "+0.05"
      supply_chain_resilience: "-0.10"
      global_gdp_growth_modifier: "*0.97"
      internet_freedom_index: "-0.05"
      us_global_standing: "-0.03"
