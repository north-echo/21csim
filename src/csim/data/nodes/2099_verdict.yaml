id: "2099_verdict"
year_month: "2099-12"
title: "Century Verdict"
description: "On December 31, 2099, historian Dr. Amara Osei -- now 97 and speaking from a wheelchair at the Nairobi Centennial -- delivered the final line of the century's last broadcast: 'The 21st century asked humanity one question: What are you? We spent a hundred years answering. The answer is still being written.' Then the clock struck midnight, and a new century began."
