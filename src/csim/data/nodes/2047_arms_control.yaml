id: "2047_arms_control"
year_month: "2047-01"
title: "Arms Control 2040s"
description: >
  The last Cold War-era arms control treaty, New START III, expires after Russia
  refuses to include China in the negotiations and China refuses to participate
  in what it calls 'a bilateral problem.' Autonomous weapons systems, cyber weapons,
  and hypersonic missiles exist in a legal void -- too new for treaties, too
  dangerous for the honor system. Former US negotiator Ambassador Sarah Blackwell
  publishes an op-ed titled 'The Most Dangerous Moment Since 1962.'
domain: "security"
confidence: "MEDIUM"
variable: "arms_control_status"
distribution:
  type: "categorical"
  options:
    new_framework: 0.20
    arms_race: 0.25
    nuclear_reduction: 0.15
    proliferation: 0.20
    stalemate: 0.20
dependencies: []
conditional: null
outcomes:
  new_framework:
    status: "DIVERGENCE"
    description: "Swiss diplomat Jean-Pierre Muller brokers the Geneva Grand Bargain: nuclear arsenals capped at 500 warheads per state, autonomous weapons required to have human-in-the-loop, cyber weapons banned against civilian infrastructure, and space weapons limited to debris cleanup. Verification uses AI-powered satellite monitoring and mandatory on-site inspections."
    world_state_effects:
      nuclear_risk_level: "-0.08"
      existential_risk_cumulative: "-0.03"
  arms_race:
    status: "ESCALATED"
    description: "The US deploys Mach 12 hypersonic glide vehicles on Ohio-class submarines; China tests an AI-commanded drone swarm of 10,000 units over the Taiwan Strait; Russia launches a nuclear-powered cruise missile with 'unlimited range.' Each development triggers the next in a spiral that burns $2.3 trillion annually and makes every city on Earth a potential target."
    world_state_effects:
      nuclear_risk_level: "+0.10"
      existential_risk_cumulative: "+0.05"
  nuclear_reduction:
    status: "DIVERGENCE"
    description: "In a surprise joint announcement from the White House and Zhongnanhai, President Nguyen and Chairman Li commit to reducing arsenals from 4,000 to 300 warheads each over 10 years. Russia, France, and the UK join within months. The warheads are dismantled at a facility in Kazakhstan under 24/7 IAEA camera surveillance; the fissile material is converted to reactor fuel."
    world_state_effects:
      nuclear_risk_level: "-0.12"
      existential_risk_cumulative: "-0.05"
  proliferation:
    status: "ESCALATED"
    description: "Saudi Arabia tests a nuclear device in the Empty Quarter, using Pakistani designs and North Korean fissile material purchased through a Lebanese intermediary. Within three years, Turkey, Egypt, South Korea, and Brazil follow. The NPT is formally declared 'inoperative'; there are now 14 nuclear-armed states, and the probability of use in any given decade approaches coin-flip territory."
    world_state_effects:
      nuclear_risk_level: "+0.15"
      existential_risk_cumulative: "+0.08"
  stalemate:
    status: "DIVERGENCE"
    description: "Negotiations drag on for six years without result; diplomats meet quarterly in Vienna, issue communiques, and change nothing. The US keeps 3,750 warheads, Russia keeps 4,200, China keeps 850. Ambassador Blackwell retires in disgust: 'We have perfected the art of talking about disarmament while polishing our missiles.'"
    world_state_effects:
      nuclear_risk_level: "+0.02"
      existential_risk_cumulative: "+0.01"
