id: "2037_latin_america"
year_month: "2037-06"
title: "Latin America Political Direction"
description: >
  Brazilian President Marina da Silva's handpicked successor governs the world's
  7th largest economy; Mexico's GDP has surpassed Italy's; and Colombia's tech
  sector employs more people than its coffee industry. But Venezuela remains a
  failed state, Argentine inflation hits 400% again, and the Darién Gap crossing
  sees 800,000 migrants annually heading north. Latin America in 2037 is a
  continent of extremes.
domain: "geopolitical"
confidence: "MEDIUM"
variable: "latin_america_status"
distribution:
  type: "categorical"
  options:
    pink_tide_2: 0.25
    right_consolidation: 0.20
    pragmatic_center: 0.30
    regional_conflict: 0.10
    us_reengagement: 0.15
dependencies: []
conditional: null
outcomes:
  pink_tide_2:
    status: "DIVERGENCE"
    description: "Left-wing governments hold power in Brazil, Mexico, Colombia, Chile, Peru, Bolivia, and Honduras simultaneously -- the broadest pink tide since the Chávez era; a charismatic union leader in Argentina, Sofia Ramirez, wins the presidency at 34 promising to nationalize lithium mines and impose a 70% tax on AI company profits; the São Paulo Forum revives as the region's coordinating body"
    explanation: "AI displacement hits Latin America's middle class hard -- 4 million call center and back-office jobs evaporate in Mexico and Colombia alone -- and the political response follows the historical pattern: inequality breeds left-populist movements that promise redistribution; this time the formula includes 'digital sovereignty' (government-controlled AI platforms) and 'resource nationalism' (state control of lithium and rare earths critical to the green transition)"
    world_state_effects:
      inequality_index: "-0.02"
      us_global_standing: "-0.02"
  right_consolidation:
    status: "DIVERGENCE"
    description: "El Salvador's Bukele model -- authoritarian security crackdowns with social media savvy -- spreads across the region: Ecuador, Guatemala, and Paraguay elect Bukele-style strongmen; Brazil's Bolsonaro movement returns to power under his son Eduardo; Argentine libertarian Milei-ism evolves into a full political movement with franchises in 6 countries"
    explanation: "The right-wing consolidation is driven by security rather than economics: cartel violence in Mexico (82,000 homicides in 2036), gang warfare in Ecuador, and the Venezuelan refugee crisis create public demand for order at any cost; voters trade democratic norms for physical safety, and the new authoritarian right proves adept at using AI-powered surveillance to deliver visible security improvements while suppressing dissent"
    world_state_effects:
      global_gdp: "+0.01"
      global_democracy_index: "-0.02"
  pragmatic_center:
    status: "DIVERGENCE"
    description: "Uruguay's steady centrist governance -- 6% growth, low corruption, universal broadband, and Latin America's best education system -- becomes the model; Chile, Costa Rica, and the Dominican Republic adopt 'Uruguayan consensus' platforms; Colombian technocrat Alejandro Gaviria governs on evidence-based policy rather than ideology, and his approval rating holds above 60% for 3 consecutive years"
    explanation: "The centrist wave is a reaction to exhaustion: electorates burned by Chávez-style left populism and Bukele-style right authoritarianism seek competent administration rather than revolutionary transformation; the centrists succeed by delivering measurable improvements -- lower infant mortality, better schools, faster internet -- rather than grand narratives, and their boring effectiveness slowly rebuilds institutional trust"
    world_state_effects:
      global_gdp: "+0.01"
      governance_model: "+0.02"
  regional_conflict:
    status: "ESCALATED"
    description: "Venezuela's collapse sends 2.8 million additional refugees into Colombia and Brazil in a single year, triggering border clashes; Guyana's oil boom provokes Venezuela to revive its territorial claim over the Essequibo region, deploying troops to the border; and Mexico's cartel war spills into Guatemala when the Sinaloa cartel seizes control of a 200km border strip to secure drug transit routes"
    explanation: "The region's conflicts feed on each other: Venezuelan refugees destabilize Colombia, Colombian drug routes destabilize Central America, Central American migration destabilizes Mexico and the US, and US disengagement destabilizes everything; the absence of an effective regional security mechanism -- the OAS having been rendered toothless by ideological divisions -- means each crisis burns unchecked until it exhausts its fuel"
    world_state_effects:
      conflict_deaths: "+15000"
      global_gdp: "-0.01"
  us_reengagement:
    status: "DIVERGENCE"
    description: "President Washington launches the '$500 Billion Americas Partnership' -- the largest US investment in the hemisphere since the Marshall Plan -- including semiconductor fabs in Mexico, green hydrogen plants in Chile, and digital infrastructure across Central America; the program is explicitly pitched as an alternative to Chinese Belt and Road: 'We forgot our neighborhood; we won't make that mistake again'"
    explanation: "China's growing influence -- $280 billion in regional investment, trade agreements with every major economy, and a naval facility in Argentina -- finally triggers the US strategic response that decades of Latin American lobbying could not; the competition benefits the region directly, as both powers bid for influence with investment rather than coercion, and Latin American nations skillfully play the two suitors against each other"
    world_state_effects:
      us_global_standing: "+0.03"
      global_gdp: "+0.01"
