id: "2030_space_tourism"
year_month: "2030-06"
title: "Space Tourism Mainstream"
description: >
  Blue Origin's 'New Glenn Tourist' vehicle launches its 200th passenger from
  Cape Canaveral; a Nigerian oil heiress, a retired Osaka schoolteacher, and
  a 19-year-old TikTok creator share a cabin. The question shifts from 'who
  can go' to 'should this many rockets be burning this much fuel.'
domain: "space"
confidence: "MEDIUM"
variable: "space_tourism_status"
distribution:
  type: "categorical"
  options:
    mainstream_suborbital: 0.30
    orbital_hotels: 0.15
    fatal_accident_setback: 0.20
    niche_luxury: 0.25
    regulatory_shutdown: 0.10
dependencies:
  - node: "2010_spacex_falcon9"
    branch: "historical_success"
    modifies:
      mainstream_suborbital: "+0.05"
      orbital_hotels: "+0.05"
      regulatory_shutdown: "-0.05"
      niche_luxury: "-0.05"
  - node: "2010_spacex_falcon9"
    branch: "spacex_fails"
    modifies:
      niche_luxury: "+0.10"
      regulatory_shutdown: "+0.05"
      mainstream_suborbital: "-0.10"
      orbital_hotels: "-0.05"
conditional: null
outcomes:
  mainstream_suborbital:
    status: "DIVERGENCE"
    description: "Virgin Galactic's Mojave terminal processes 40 flights per week; Blue Origin undercuts them at $89,000 a seat; 4,200 people reach space in a single year, more than all government astronauts in history combined"
    explanation: "Reusable vehicle economics follow the airline playbook -- fill the seats, cut the price; three consecutive years without a fatality builds insurance industry confidence, and Lloyd's of London begins offering standard space tourism policies"
    world_state_effects:
      space_development_index: "+0.05"
    cascading_modifiers:
      2045_space_economy.on_track: "+0.03"
  orbital_hotels:
    status: "DIVERGENCE"
    description: "Vast Space opens 'Haven-1' orbital hotel at 400km altitude: 6 suites with floor-to-ceiling Earth-view windows, a zero-gravity bar, and a 14-day stay priced at $28 million; fully booked through 2032 within 72 hours"
    explanation: "SpaceX Dragon ferries guests up on biweekly rotations; the station's Instagram account gains 90 million followers in its first month, and three separate reality TV shows compete for filming rights"
    world_state_effects:
      space_development_index: "+0.08"
    cascading_modifiers:
      2045_space_economy.explosive: "+0.03"
  fatal_accident_setback:
    status: "ESCALATED"
    description: "A Virgin Galactic suborbital vehicle breaks apart during re-entry over New Mexico, killing all six passengers including 31-year-old Indian tech founder Priya Mehta; her final livestream, watched by 12 million people, goes dark at 62km altitude"
    explanation: "FAA grounds all commercial human spaceflight for 11 months; Congress passes the 'Mehta Safety Act' requiring triple-redundant life support and government-certified pilots; ticket insurers withdraw from the market and three smaller operators fold"
    world_state_effects:
      space_development_index: "-0.03"
  niche_luxury:
    status: "DIVERGENCE"
    description: "Only 73 tourists fly in 2030, each paying $650,000 or more; the passenger manifest reads like the Forbes 400 -- hedge fund managers, tech founders, a Saudi prince -- prompting the Economist to call it 'the world's most expensive selfie opportunity'"
    explanation: "Vehicle reusability hits diminishing returns on cost reduction; the addressable market for half-million-dollar thrill rides turns out to be narrow, and operators pivot to satellite deployment as their primary revenue while keeping tourism as a prestige sideshow"
    world_state_effects:
      space_development_index: "+0.02"
  regulatory_shutdown:
    status: "DIVERGENCE"
    description: "EU bans leisure spaceflight from European soil over carbon emissions; a Greenpeace blockade of the Boca Chica launch site goes viral; the UN Environmental Programme calculates that 1,000 annual tourist launches would produce more black carbon than all of sub-Saharan Africa"
    explanation: "The 'Fly Less' climate movement turns its fire on rockets after largely winning the fight against short-haul aviation; even the FAA imposes a 200-launch annual cap for tourist flights, making the economics unworkable for all but SpaceX"
    world_state_effects:
      space_development_index: "-0.02"
