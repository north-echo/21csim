id: "2034_food_shock"
year_month: "2034-06"
title: "Global Food System Shock"
description: >
  A simultaneous heat dome over the US Midwest and a failed Indian monsoon
  destroy 40% of the world's wheat and rice harvest in a single season;
  Chicago Board of Trade wheat futures hit $28/bushel -- 4x the 2025 price --
  and grocery store shelves in Cairo and Karachi empty within days.
domain: "climate"
confidence: "MEDIUM"
variable: "food_shock_status"
distribution:
  type: "categorical"
  options:
    managed_crisis: 0.30
    regional_famines: 0.30
    global_food_emergency: 0.15
    averted_by_tech: 0.15
    no_failure: 0.10
dependencies: []
conditional: "climate_temp_anomaly > 1.3"
outcomes:
  managed_crisis:
    status: "DIVERGENCE"
    description: "The G20's Emergency Food Coordination Center in Rome, activated for the first time, releases 48 million tonnes from strategic grain reserves; China opens its national stockpile (the world's largest, holding 65% of global rice reserves); India bans rice exports but negotiates a UN-brokered swap for Canadian wheat; food prices spike 180% but famine is averted"
    explanation: "The system bends but doesn't break because of reserves built after the 2022 Ukraine food shock: 34 nations now maintain 6-month strategic grain stockpiles, and the WFP's AI logistics system reroutes shipments in real time based on satellite-monitored crop failures and port capacity; 22 million people require emergency food assistance but zero mass starvation events occur"
    world_state_effects:
      food_security_index: "-0.10"
      conflict_deaths: "+5000"
  regional_famines:
    status: "ESCALATED"
    description: "34 million people face acute starvation in a belt stretching from Guatemala to Bangladesh; famine is officially declared in South Sudan, northern Nigeria, Yemen, and the Afghan province of Badghis; the most devastating images come from Bihar, India, where 8 million subsistence farmers lose their entire rice crop to the failed monsoon"
    explanation: "The crisis hits hardest where it always does -- subsistence farming regions with no irrigation, no reserves, and no purchasing power to bid for expensive imports; the WFP burns through its annual budget in 4 months and launches an emergency appeal for $28 billion that is only 40% funded, while grain-exporting nations face domestic political pressure to keep food at home"
    world_state_effects:
      food_security_index: "-0.20"
      conflict_deaths: "+50000"
  global_food_emergency:
    status: "ESCALATED"
    description: "US Midwest, Argentine Pampas, Ukrainian steppe, and Punjab all fail simultaneously -- the first time all four major breadbaskets have collapsed in the same year; global grain production falls 45% below demand; rice riots topple governments in Egypt, Pakistan, and Indonesia within 3 months of each other"
    explanation: "The synchronized failure is driven by a jet stream pattern that parks heat domes over all major mid-latitude agricultural regions simultaneously -- a configuration that climate models showed was possible but vanishingly unlikely before 2050; with no breadbasket to compensate for another's failure, the global food system experiences a systemic shock beyond any designed resilience margin"
    world_state_effects:
      food_security_index: "-0.35"
      conflict_deaths: "+200000"
    cascading_modifiers:
      2036_water_conflict.multiple_conflicts: "+0.15"
      2033_post_oil.regional_conflict: "+0.10"
      2035_china_post_xi.instability: "+0.08"
      2034_israel_palestine.escalation: "+0.10"
  averted_by_tech:
    status: "DIVERGENCE"
    description: "CRISPR-edited drought-tolerant wheat varieties developed by the International Center for Wheat Research in Mexico maintain 70% yield despite the heat dome; Singapore's vertical farms, now producing 30% of the city-state's vegetables, prove immune to climate disruption; Upside Foods' cultivated chicken reaches price parity with conventional poultry and scales to 2% of the US protein market"
    explanation: "A decade of investment in agricultural resilience pays off: drought-resistant crops bred for exactly these conditions perform as designed, indoor farming provides a climate-proof supplement for high-value produce, and cellular agriculture reduces the food system's dependence on animal feed crops; the crisis that would have been catastrophic in 2025 is merely expensive in 2034"
    world_state_effects:
      food_security_index: "+0.05"
      conflict_deaths: "+0"
  no_failure:
    status: "DIVERGENCE"
    description: "The Midwest heat dome dissipates after 3 weeks rather than the feared 6, and the Indian monsoon arrives late but delivers 85% of normal rainfall; global crop losses reach 12% -- painful but manageable; commodity prices spike briefly then settle as markets recognize the harvest is bruised but not broken"
    explanation: "Climate luck plays a role -- the jet stream pattern shifts before inflicting maximum damage -- but so does systemic resilience: crop diversification, improved soil management, and satellite-guided precision irrigation allow farmers to adapt in real time; the food system absorbs a significant shock without cascading failure, vindicating decades of agricultural research investment"
    world_state_effects:
      food_security_index: "+0.02"
      conflict_deaths: "+0"
