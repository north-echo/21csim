id: "2034_food_shock"
year_month: "2034-06"
title: "Global Food System Shock"
description: >
  Convergence of climate impacts, soil degradation, and population growth
  stress the global food system. Multiple breadbasket failures could trigger
  the first truly global food crisis.
domain: "climate"
confidence: "MEDIUM"
variable: "food_shock_status"
distribution:
  type: "categorical"
  options:
    managed_crisis: 0.30
    regional_famines: 0.30
    global_food_emergency: 0.15
    averted_by_tech: 0.15
    no_failure: 0.10
dependencies: []
conditional: "climate_temp_anomaly > 1.3"
outcomes:
  managed_crisis:
    status: "DIVERGENCE"
    description: "Major food price spikes but international coordination prevents famine"
    explanation: "Strategic reserves, trade agreements, and emergency aid prevent worst outcomes despite crop failures"
    world_state_effects:
      food_security_index: "-0.10"
      conflict_deaths: "+5000"
  regional_famines:
    status: "ESCALATED"
    description: "Famines strike multiple regions; tens of millions face starvation"
    explanation: "Simultaneous failures in South Asia, Sub-Saharan Africa, and Central America overwhelm response capacity"
    world_state_effects:
      food_security_index: "-0.20"
      conflict_deaths: "+50000"
  global_food_emergency:
    status: "ESCALATED"
    description: "Unprecedented global food emergency; breadbasket failures cascade"
    explanation: "Simultaneous heat waves destroy crops across multiple continents; supply chains collapse"
    world_state_effects:
      food_security_index: "-0.35"
      conflict_deaths: "+200000"
    cascading_modifiers:
      2036_water_conflict.multiple_conflicts: "+0.15"
      2033_post_oil.regional_conflict: "+0.10"
      2035_china_post_xi.instability: "+0.08"
      2034_israel_palestine.escalation: "+0.10"
  averted_by_tech:
    status: "DIVERGENCE"
    description: "Agricultural technology prevents crisis; lab-grown and precision farming scale"
    explanation: "Gene-edited drought-resistant crops, vertical farming, and cellular agriculture fill the gap"
    world_state_effects:
      food_security_index: "+0.05"
      conflict_deaths: "+0"
  no_failure:
    status: "DIVERGENCE"
    description: "Food system proves more resilient than feared"
    explanation: "Climate impacts less severe in agricultural regions; diversified food sources buffer shocks"
    world_state_effects:
      food_security_index: "+0.02"
      conflict_deaths: "+0"
