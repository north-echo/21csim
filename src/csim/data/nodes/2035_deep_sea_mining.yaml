id: "2035_deep_sea_mining"
year_month: "2035-06"
title: "Deep Sea Mining"
description: >
  Whether commercial deep-sea mining of polymetallic nodules and rare earth
  elements proceeds, and under what regulatory framework. Balances resource
  needs against environmental risks to ocean ecosystems.
domain: "technology"
confidence: "MEDIUM"
variable: "deep_sea_mining_status"
distribution:
  type: "categorical"
  options:
    commercial_operations: 0.25
    environmental_ban: 0.20
    limited_regulated: 0.30
    technology_fails: 0.15
    conflict_over_resources: 0.10
dependencies: []
conditional: null
outcomes:
  commercial_operations:
    status: "DIVERGENCE"
