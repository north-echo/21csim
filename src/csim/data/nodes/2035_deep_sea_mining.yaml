      global_gdp: "+0.01"
      renewable_energy_share: "+0.02"
  environmental_ban:
    status: "DIVERGENCE"
    description: "International moratorium or ban on deep-sea mining"
    explanation: "Scientific evidence of ecosystem damage and environmental movement pressure block exploitation"
    world_state_effects:
      governance_model: "+0.02"
  limited_regulated:
    status: "DIVERGENCE"
    description: "Limited deep-sea mining under strict environmental regulation"
    explanation: "ISA establishes tight regulatory framework; mining proceeds at small scale with monitoring"
