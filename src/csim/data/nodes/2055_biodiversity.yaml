id: "2055_biodiversity"
year_month: "2055-01"
title: "Biodiversity Crisis Resolution"
description: >
  The biodiversity crisis reaches a defining moment as species extinction rates
  either stabilize through conservation efforts or accelerate into a mass
  extinction event rivaling the geological record.
domain: "climate"
confidence: "LOW"
variable: "biodiversity_status"
distribution:
  type: "categorical"
  options:
    mass_extinction: 0.20
    stabilized: 0.25
    recovery: 0.15
    collapse: 0.10
    rewilding: 0.15
    managed: 0.15
dependencies: []
conditional: "biodiversity_index < 0.50"
outcomes:
  mass_extinction:
    status: "ESCALATED"
    description: "Sixth mass extinction confirmed; over 50% of species lost within decades"
    world_state_effects:
      biodiversity_index: "-0.20"
      food_security_index: "-0.12"
  stabilized:
    status: "DIVERGENCE"
    description: "Conservation efforts halt biodiversity decline; extinction rate returns to background levels"
    world_state_effects:
      biodiversity_index: "+0.05"
      food_security_index: "+0.02"
  recovery:
    status: "DIVERGENCE"
    description: "Active restoration and de-extinction technologies drive biodiversity recovery"
    world_state_effects:
      biodiversity_index: "+0.10"
  collapse:
    status: "ESCALATED"
    description: "Ecosystem collapse cascades through food webs; agricultural systems destabilized"
    world_state_effects:
      biodiversity_index: "-0.30"
      food_security_index: "-0.20"
  rewilding:
    status: "DIVERGENCE"
    description: "Large-scale rewilding programs restore ecosystems across continents"
    world_state_effects:
      biodiversity_index: "+0.12"
      food_security_index: "+0.03"
  managed:
    status: "DIVERGENCE"
    description: "Biodiversity managed through conservation corridors and genetic banks but wild populations diminish"
    world_state_effects:
      biodiversity_index: "-0.05"
