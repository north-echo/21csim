id: "2026_post_quantum_crypto"
year_month: "2026-01"
title: "Post-Quantum Cryptography Transition"
description: >
  Global race to migrate encryption systems to post-quantum algorithms
  before quantum computers can break RSA and ECC. NIST finalizes
  standards, but migration of legacy systems proves enormously complex.
  "Harvest now, decrypt later" attacks already underway.
domain: "technology"
confidence: "MEDIUM"
variable: "post_quantum_crypto"
distribution:
  type: "categorical"
  options:
    orderly_transition: 0.30
    chaotic_scramble: 0.30
    quantum_breaks_rsa: 0.10
    crypto_agility: 0.15
    fragmented_standards: 0.15
dependencies:
