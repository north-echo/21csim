    branch: "breakthrough_2025"
    modifies:
      quantum_breaks_rsa: "+0.15"
      chaotic_scramble: "+0.10"
      orderly_transition: "-0.15"
      crypto_agility: "-0.10"
  - node: "2019_quantum"
    branch: "encryption_broken"
    modifies:
      quantum_breaks_rsa: "+0.25"
      chaotic_scramble: "+0.10"
      orderly_transition: "-0.25"
      fragmented_standards: "-0.10"
conditional: null
outcomes:
