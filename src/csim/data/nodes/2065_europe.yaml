    description: "President-Commissioner Katarina Novak of Slovenia commands a unified European military of 1.2 million, a single treasury, and a diplomatic corps that speaks with one voice for 450 million citizens across 31 member states. The old national parliaments still exist, but mostly as tourist attractions; the real power lives in the glass towers of the Brussels Federal Quarter."
    world_state_effects: {}
  superpower:
    status: "DIVERGENCE"
    description: "Europe's combined GDP surpassed both the US and China in 2063, driven by dominance in quantum computing, biotech, and AI ethics frameworks that became global standards. European Space Agency Director Dr. Mikael Lindqvist announced a crewed Mars mission for 2070; the rocket will launch from French Guiana with a crew of nine from seven nations."
    world_state_effects: {}
  dissolved:
    status: "ESCALATED"
    description: "The EU formally dissolved on March 15, 2063, exactly 106 years after the Treaty of Rome. The final session in Strasbourg was attended by only 340 of 705 MEPs; the others had already gone home. Hungarian Prime Minister Zsolt Orbán III toasted the occasion with Tokaji wine, calling it 'the end of a beautiful hallucination.'"
    world_state_effects: {}
  social_model:
    status: "DIVERGENCE"
    description: "Europeans work an average of 24 hours per week, retire at 55 with full benefits, and enjoy universal healthcare that includes mental wellness AI companions. The 'Copenhagen Model' has been adopted by 30 non-European nations. The trade-off -- a 2.1% annual growth rate that makes investors yawn -- is considered a feature, not a bug."
    world_state_effects: {}
  fortress:
    status: "DIVERGENCE"
    description: "The 'Schengen Reversal' of 2060 reintroduced hard borders across Europe and deployed AI-guided patrol drones along the Mediterranean. Europe's population is 94% native-born, the oldest and most homogeneous of any major bloc. Visitors describe an unsettling perfection: every train runs on time, every park is immaculate, and the silence in the cafes feels like holding your breath."
    world_state_effects: {}
  cultural_power:
    status: "DIVERGENCE"
