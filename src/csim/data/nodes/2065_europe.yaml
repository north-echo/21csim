id: "2065_europe"
year_month: "2065-01"
title: "Europe 2065"
description: >
  The median age in Germany is 56; in Italy, 59. European cities are beautiful,
  quiet, and increasingly empty. A joke circulates in Brussels: "Europe has the
  best hospitals, the finest restaurants, and the oldest customers for both."
  Whether this graceful aging constitutes success or decline depends entirely
  on whom you ask.
