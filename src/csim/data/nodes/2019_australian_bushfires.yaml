id: "2019_australian_bushfires"
year_month: "2019-12"
title: "Australian Bushfires"
description: >
  Unprecedented bushfires burn across southeastern Australia from late 2019
  into early 2020, destroying over 46 million acres and killing an estimated
  3 billion animals. The fires become a visceral symbol of climate change
  impacts and the concept of a climate "new normal" in a developed nation.
