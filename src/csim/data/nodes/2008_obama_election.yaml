id: "2008_obama_election"
year_month: "2008-11"
title: "2008 US Presidential Election"
description: >
  In the base spec, this is implicit (the 2016 node references the prior cycle).
  Making it explicit allows the Obama/McCain choice to affect the 2009-2015
  period independently of the financial crisis.
domain: "geopolitical"
confidence: "HIGH"
variable: "election_2008_outcome"
distribution:
  type: "categorical"
  options:
    obama_wins: 0.55
    mccain_wins: 0.35
    third_party_factor: 0.05
    contested: 0.05
dependencies:
  - node: "2008_financial_crisis"
    branch: "great_depression_2"
    modifies:
      obama_wins: "+0.10"
      mccain_wins: "-0.10"
  - node: "2008_financial_crisis"
    branch: "mild_recession"
    modifies:
      mccain_wins: "+0.10"
      obama_wins: "-0.05"
conditional: null
outcomes:
  obama_wins:
    status: "HISTORICAL"
    description: "Barack Obama wins presidency; first Black president"
    world_state_effects:
      us_polarization: "+0.03"
      us_global_standing: "+0.05"
      racial_justice_index: "+0.05"
    cascading_modifiers:
      2010_arab_spring.broader_success: "+0.05"
      2014_blm.historical_wave: "+0.03"
  mccain_wins:
    status: "DIVERGENCE"
    description: "John McCain wins; Republican continuity through financial crisis"
    world_state_effects:
      us_polarization: "+0.02"
      us_global_standing: "-0.02"
      racial_justice_index: "-0.02"
    cascading_modifiers:
      2015_iran_deal.no_deal: "+0.15"
      2015_paris_climate.no_agreement: "+0.10"
  third_party_factor:
    status: "DIVERGENCE"
    description: "Ron Paul independent run splits Republican vote"
    world_state_effects:
      us_polarization: "+0.04"
      us_global_standing: "+0.03"
      racial_justice_index: "+0.03"
  contested:
    status: "DIVERGENCE"
    description: "Election result contested; prolonged uncertainty"
    world_state_effects:
      us_polarization: "+0.06"
      us_institutional_trust: "-0.04"
