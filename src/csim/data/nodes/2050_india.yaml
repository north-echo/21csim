id: "2050_india"
year_month: "2050-01"
title: "India at Mid-Century"
description: >
  India's population peaks at 1.66 billion; its economy, at $14 trillion, is the
  world's third largest. The Bangalore-Hyderabad tech corridor produces more AI
  researchers than the US and China combined. But 340 million Indians still lack
  reliable clean water, and the gap between a software engineer in Pune and a
  farmer in Bihar is wider than the gap between countries.
domain: "regional"
confidence: "LOW"
variable: "india_status"
