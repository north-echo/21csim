id: "2050_india"
year_month: "2050-01"
title: "India at Mid-Century"
description: >
  India's trajectory as the world's most populous nation reaches a defining moment.
  Whether it rises as a superpower, maintains democratic traditions, or succumbs
  to climate and internal pressures shapes the Asian century.
domain: "regional"
confidence: "LOW"
variable: "india_status"
distribution:
