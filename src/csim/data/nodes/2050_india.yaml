      us_global_standing: "-0.03"
  regional_power:
    status: "DIVERGENCE"
    description: "India remains a strong regional power without achieving global superpower status"
    world_state_effects:
      global_democracy_index: "+0.01"
  democratic_leader:
    status: "DIVERGENCE"
    description: "India becomes the global leader of democratic values and institutions"
    world_state_effects:
      global_democracy_index: "+0.05"
  hindu_state:
    status: "DIVERGENCE"
