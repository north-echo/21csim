id: "2048_asteroid_mining"
year_month: "2048-06"
title: "Asteroid Redirect Mission"
description: >
  First mission to redirect a near-Earth asteroid into a stable orbit for
  mining operations. Asteroids contain trillions of dollars worth of platinum
  group metals, water, and rare earth elements. Success could transform
  resource economics; failure could set space mining back decades.
domain: "space"
confidence: "LOW"
variable: "asteroid_mining_status"
distribution:
  type: "categorical"
  options:
    successful_redirect: 0.20
    mining_operational: 0.10
    redirect_fails: 0.20
    too_expensive: 0.30
    international_program: 0.20
dependencies: []
conditional: null
outcomes:
  successful_redirect:
    status: "DIVERGENCE"
    description: "Near-Earth asteroid successfully captured and placed in lunar orbit for study and mining"
    explanation: "Ion propulsion and autonomous guidance systems redirect a 500-ton asteroid; sample analysis confirms resource wealth"
    world_state_effects:
      space_development_index: "+0.10"
    cascading_modifiers:
      2055_mars_self_sufficient.thriving: "+0.03"
  mining_operational:
    status: "DIVERGENCE"
    description: "Asteroid mining produces first commercial quantities of platinum group metals"
    explanation: "Automated extraction and processing in orbit; materials returned to Earth or used in space construction"
    world_state_effects:
      space_development_index: "+0.15"
      global_gdp_growth_modifier: "+0.01"
  redirect_fails:
    status: "DIVERGENCE"
    description: "Asteroid redirect mission fails; sets back space mining ambitions by a decade"
    explanation: "Propulsion system malfunction or targeting error; asteroid escapes capture trajectory"
    world_state_effects:
      space_development_index: "-0.03"
  too_expensive:
    status: "DIVERGENCE"
    description: "Asteroid mining technically possible but economics don't close; terrestrial alternatives cheaper"
    explanation: "Launch and processing costs exceed the value of returned materials; investors retreat"
    world_state_effects:
      space_development_index: "+0.02"
  international_program:
    status: "DIVERGENCE"
    description: "Multinational asteroid mining program shares costs and resources across space agencies"
    explanation: "No single nation can afford it alone; UN-brokered consortium pools funding and technology"
    world_state_effects:
      space_development_index: "+0.08"
      global_democracy_index: "+0.01"
