id: "2032_moon_base"
year_month: "2032-06"
title: "Lunar Base Establishment"
description: >
  NASA's Artemis VII crew has spent 14 consecutive days at the lunar south pole,
  drilling for water ice in Shackleton Crater while a Chinese Chang'e-8 robotic
  lander builds a regolith-brick shelter 200km away. The Moon has not seen this
  much activity since it formed 4.5 billion years ago.
domain: "technology"
confidence: "MEDIUM"
variable: "moon_base_status"
distribution:
  type: "categorical"
  options:
    us_china_bases: 0.25
    international_base: 0.15
    us_only: 0.15
    china_only: 0.10
    delayed_2040: 0.25
    abandoned: 0.10
dependencies: []
conditional: null
outcomes:
  us_china_bases:
    status: "DIVERGENCE"
    description: "NASA's 'Moonstead Alpha' and CNSA's 'Guanghan Palace' base sit 120km apart near the lunar south pole; both claim overlapping ice-mining zones in Shackleton Crater, and a diplomatic incident erupts when a Chinese rover crosses within 500m of an American EVA site without notification"
    explanation: "The lunar surface becomes a proxy for US-China competition: each side races to establish 'facts on the ground' (or regolith) by building permanent infrastructure; the Outer Space Treaty's prohibition on national sovereignty claims is tested to its limits as both nations declare 'safety zones' around their bases"
    world_state_effects:
      space_development_index: "+0.15"
  international_base:
    status: "DIVERGENCE"
    description: "The 'Selene Station' -- funded by NASA, ESA, JAXA, CSA, and ISRO -- opens with a 6-person rotating crew; Indian geologist Dr. Kavya Radhakrishnan becomes the first person to live on the Moon for 90 consecutive days; the station's modular design includes a Japanese-built greenhouse growing lettuce under LED lights"
    explanation: "The ISS model proves transferable: no single nation can afford a permanent lunar base alone, but cost-sharing across 5 agencies makes it viable at $8 billion annually; the cooperative framework also provides diplomatic cover, preventing the Moon from becoming another theater of US-China competition"
    world_state_effects:
      space_development_index: "+0.12"
  us_only:
    status: "DIVERGENCE"
    description: "NASA administrator Dr. James Okafor cuts the ribbon on 'Artemis Base Camp' at Shackleton Crater rim, supported by SpaceX Starship cargo runs every 8 weeks; China's program stalls after a Long March 10 launch failure kills the crew of Shenzhou-22 in lunar orbit"
    explanation: "SpaceX's ability to deliver 100 tonnes of cargo to the lunar surface per mission gives the US an insurmountable logistics advantage; the Shenzhou-22 tragedy -- China's first astronaut fatalities -- triggers a 3-year program review that delays the Guanghan Palace base until at least 2037"
    world_state_effects:
      space_development_index: "+0.10"
  china_only:
    status: "DIVERGENCE"
    description: "CNSA's 'Guanghan Palace' base is occupied continuously from September 2032, with taikonauts mining water ice and 3D-printing habitat walls from regolith; NASA's Artemis program, defunded by 30% in a congressional budget fight, manages only intermittent crewed visits and relies on robotic precursors"
    explanation: "China's 15-year plan, executed with the steady funding only a command economy can provide, outpaces NASA's start-stop cycle of political reprioritization; the image of the Chinese flag planted beside a permanent lunar structure, broadcast globally, shifts perceptions of technological leadership in ways that ripple far beyond space policy"
    world_state_effects:
      space_development_index: "+0.08"
      china_power_index: "+0.03"
  delayed_2040:
    status: "DIVERGENCE"
    description: "Artemis IX's lunar lander develops a fuel leak during descent and aborts 3km above the surface; China's habitat-construction robot fails in the extreme cold of permanent shadow; both programs quietly push permanent base timelines to 'no earlier than 2040' while maintaining crewed fly-by and short-stay missions"
    explanation: "The engineering reality of sustaining human life on the Moon -- radiation shielding, dust contamination, cryogenic fuel storage, and resupply logistics -- proves harder than either nation's optimistic timelines assumed; both programs remain active but at reduced ambition, and the Moon stays a place humans visit rather than live"
    world_state_effects:
      space_development_index: "+0.03"
  abandoned:
    status: "DIVERGENCE"
    description: "After the US diverts $18 billion in NASA funding to climate adaptation and China redirects space budgets to its demographic crisis, both lunar base programs are indefinitely suspended; a lonely Chinese rover continues autonomous operations at the south pole, its data downloaded by a skeleton crew in Beijing"
    explanation: "The convergence of climate emergencies, AI economic disruption, and aging-population costs makes $40+ billion lunar bases politically indefensible in both Washington and Beijing; robotic missions continue at a fraction of the cost, and planetary scientists argue that machines do better science anyway without the expense of life support"
    world_state_effects:
      space_development_index: "+0.01"
