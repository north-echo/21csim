id: "2095_europe"
year_month: "2095-01"
title: "Europe 2095"
description: >
  Europe's median age in 2095 is 61. The continent is a living museum of
  architectural beauty, maintained by robotic groundskeepers and visited by
  tourists from younger, louder civilizations. Italian poet Marco Ferrante,
  92, described it best: "Europe is a grandmother who still dresses beautifully
  and tells extraordinary stories. Whether the grandchildren are listening
  is another matter."
