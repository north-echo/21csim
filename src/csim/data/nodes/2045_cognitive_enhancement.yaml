id: "2045_cognitive_enhancement"
year_month: "2045-06"
title: "Cognitive Enhancement"
description: >
  Neuralink's N7 implant allows users to process information 3x faster, access
  cloud memory, and communicate silently via thought-to-text. A Stanford study
  shows enhanced subjects outperform unenhanced peers by 280% on complex problem-
  solving tasks. The $185,000 procedure has a 14-month waitlist in Palo Alto; in
  Lagos and Lima, people have never heard of it.
domain: "technology"
confidence: "MEDIUM"
variable: "cognitive_enhancement_status"
distribution:
  type: "categorical"
  options:
    elite_only: 0.30
    democratized: 0.10
    banned: 0.15
    military_first: 0.20
    voluntary: 0.15
    biological_risks: 0.10
