conditional: null
outcomes:
  elite_only:
    status: "DIVERGENCE"
    description: "Enhanced executives at Goldman Sachs and McKinsey process quarterly reports in 11 minutes; their unenhanced competitors take days. Silicon Valley schools require N7 implants for admission to advanced tracks. A new slang term -- 'cogpoor' -- enters the lexicon for the unenhanced majority, who find themselves unemployable in knowledge work."
    world_state_effects:
      human_augmentation_prevalence: "+0.10"
      inequality_index: "+0.12"
  democratized:
    status: "DIVERGENCE"
    description: "Indian generic manufacturer Cipla reverse-engineers the N7 and produces the 'NeuroBasic' implant for $900, subsidized to free in 40 nations by the WHO. A rice farmer in Myanmar gains the ability to read English, access agronomic databases, and calculate optimal planting schedules through thought alone. Global average IQ rises 18 points in five years."
    world_state_effects:
      human_augmentation_prevalence: "+0.25"
      inequality_index: "-0.05"
  banned:
    status: "DIVERGENCE"
    description: "After three N7 recipients in Seoul suffer catastrophic seizures from a firmware update, 67 nations ban neural implants for cognitive enhancement. The Vatican declares enhancement 'a violation of the soul's integrity'; Japan's Diet passes the 'Human Purity Act.' Underground enhancement clinics spring up in Bangkok and Tijuana, performing procedures in back rooms."
    world_state_effects:
      human_augmentation_prevalence: "+0.02"
      inequality_index: "+0.01"
  military_first:
    status: "DIVERGENCE"
    description: "DARPA's 'Cognitive Warrior' program deploys N7-enhanced special operators who process battlefield data 4x faster and communicate silently in coordinated teams. China's PLA matches the program within 18 months. Enhanced soldiers describe the experience as 'seeing the matrix'; unenhanced troops become support personnel overnight."
    world_state_effects:
      human_augmentation_prevalence: "+0.08"
      inequality_index: "+0.05"
  voluntary:
    status: "DIVERGENCE"
    description: "The EU's 'Cognitive Autonomy Directive' regulates enhancement like elective surgery: available to adults, covered by some insurance plans, with mandatory 6-month evaluation periods. Adoption rates hover around 22% in developed nations, creating a society where enhanced and unenhanced coexist uneasily, like a world where some people can see in the dark and others cannot."
    world_state_effects:
      human_augmentation_prevalence: "+0.15"
      inequality_index: "+0.02"
  biological_risks:
    status: "ESCALATED"
    description: "Within 3 years of mass adoption, 4,200 N7 recipients develop 'interface syndrome' -- a degenerative condition where the brain's neural pathways reorganize around the implant, causing personality dissolution and eventual catatonia. Tech journalist Marcus Webb, one of the first enhanced, livestreams his own cognitive decline before going silent. The FDA pulls all implants; Neuralink's stock drops to zero."
    world_state_effects:
      human_augmentation_prevalence: "+0.03"
      inequality_index: "+0.02"
