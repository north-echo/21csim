id: "2075_global_governance"
year_month: "2075-01"
title: "Global Governance 2075"
description: >
  The phrase "Who is in charge?" appears on protest signs in 14 languages
  outside the UN General Assembly in 2075. Secretary-General Kwame Asante-Darko
  of Ghana inherited an institution that is either the embryo of a world
  government or a very expensive debating society, depending on which corridor
  you walk down. His predecessor resigned after 18 months, citing "the
  impossibility of herding 193 cats."
domain: "geopolitics"
confidence: "LOW"
variable: "global_governance_2075"
distribution:
  type: "categorical"
  options:
    world_government: 0.05
    reformed_un: 0.15
