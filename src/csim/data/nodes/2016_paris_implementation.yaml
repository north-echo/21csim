id: "2016_paris_implementation"
year_month: "2016-04"
title: "Paris Agreement Implementation"
description: >
  Countries submit Nationally Determined Contributions (NDCs) under the
  Paris Agreement. The ratchet mechanism requires progressively stronger
  targets every 5 years. Whether nations follow through or free-ride
  determines whether Paris achieves its 1.5-2C goal.
domain: "energy"
confidence: "HIGH"
variable: "paris_implementation"
distribution:
  type: "categorical"
  options:
    historical_weak_ndcs: 0.45
    strong_compliance: 0.15
    widespread_defection: 0.20
    ratchet_works: 0.10
    two_speed_world: 0.10
dependencies:
  - node: "2015_paris_climate"
    branch: "binding_agreement"
    modifies:
      strong_compliance: "+0.15"
      historical_weak_ndcs: "-0.10"
      widespread_defection: "-0.05"
  - node: "2015_paris_climate"
    branch: "no_agreement"
    modifies:
      widespread_defection: "+0.20"
      historical_weak_ndcs: "-0.10"
      strong_compliance: "-0.10"
conditional: null
outcomes:
  historical_weak_ndcs:
    status: "HISTORICAL"
    description: "NDCs submitted but insufficient; world tracks 2.5-3C warming"
    world_state_effects:
      climate_temp_anomaly: "+0.03"
      renewable_energy_share: "+0.02"
    cascading_modifiers:
      2025_climate_tipping.on_track_2_5c: "+0.05"
  strong_compliance:
    status: "DIVERGENCE"
    description: "Major emitters exceed NDC targets; 1.5C pathway viable"
    world_state_effects:
      climate_temp_anomaly: "-0.04"
      renewable_energy_share: "+0.06"
      global_gdp_growth_modifier: "*0.99"
    cascading_modifiers:
      2025_climate_tipping.accelerated_action: "+0.10"
      2027_energy_transition.rapid_transition: "+0.08"
  widespread_defection:
    status: "DIVERGENCE"
    description: "Paris Agreement collapses as major emitters abandon commitments"
    world_state_effects:
      climate_temp_anomaly: "+0.06"
      renewable_energy_share: "+0.01"
    cascading_modifiers:
      2025_climate_tipping.tipping_point_crossed: "+0.08"
  ratchet_works:
    status: "DIVERGENCE"
    description: "Ratchet mechanism drives progressively stronger targets; 2C pathway secured"
    world_state_effects:
      climate_temp_anomaly: "-0.02"
      renewable_energy_share: "+0.05"
    cascading_modifiers:
      2025_climate_tipping.accelerated_action: "+0.07"
      2027_energy_transition.rapid_transition: "+0.05"
  two_speed_world:
    status: "DIVERGENCE"
    description: "Developed nations comply; developing nations prioritize growth over climate"
    world_state_effects:
      climate_temp_anomaly: "+0.02"
      renewable_energy_share: "+0.03"
      inequality_index: "+0.02"
