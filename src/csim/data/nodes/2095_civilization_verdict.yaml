    description: "Human civilization thriving by most measures; major challenges met and overcome"
    world_state_effects:
      existential_risk_cumulative: "-0.10"
  surviving:
    status: "DIVERGENCE"
    description: "Civilization persists but with significant scars from the century's challenges"
    world_state_effects:
      existential_risk_cumulative: "+0.00"
  declining:
    status: "ESCALATED"
    description: "Civilization on a downward trajectory; key indicators worsening"
    world_state_effects:
      existential_risk_cumulative: "+0.10"
  transformed:
    status: "DIVERGENCE"
    description: "Civilization so different from 2000 that traditional metrics no longer apply"
    world_state_effects:
      existential_risk_cumulative: "+0.00"
  transcended:
    status: "DIVERGENCE"
    description: "Humanity has transcended biological civilization; post-human era begun"
    world_state_effects:
      existential_risk_cumulative: "-0.05"
  endangered:
    status: "ESCALATED"
