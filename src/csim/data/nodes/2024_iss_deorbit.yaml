id: "2024_iss_deorbit"
year_month: "2024-01"
title: "ISS Transition"
description: >
  ISS approaching end of life. Transition to commercial stations
  (Axiom, Orbital Reef) or gap in human spaceflight capability.
domain: "space"
confidence: "HIGH"
variable: "iss_transition_status"
distribution:
  type: "categorical"
  options:
    smooth_transition: 0.30
    capability_gap: 0.35
    extended_iss: 0.15
    china_station_dominant: 0.15
    no_replacement: 0.05
dependencies:
  - node: "2010_spacex_falcon9"
    branch: "historical_success"
    modifies:
      smooth_transition: "+0.10"
      capability_gap: "-0.05"
      no_replacement: "-0.05"
  - node: "2010_spacex_falcon9"
    branch: "spacex_fails"
    modifies:
      capability_gap: "+0.10"
      no_replacement: "+0.05"
      smooth_transition: "-0.15"
conditional: null
outcomes:
  smooth_transition:
    status: "DIVERGENCE"
    description: "Commercial stations ready; seamless handoff from ISS to Axiom and Orbital Reef"
    explanation: "Private investment and NASA support ensure continuous human presence in LEO"
    world_state_effects:
      space_development_index: "+0.05"
      us_global_standing: "+0.02"
  capability_gap:
    status: "DIVERGENCE"
    description: "3-5 year gap with no Western space station; reliance on Tiangong for human research"
    explanation: "Commercial stations delayed; ISS deorbited on schedule leaving capability gap"
    world_state_effects:
      space_development_index: "-0.03"
      china_power_index: "+0.02"
  extended_iss:
    status: "DIVERGENCE"
    description: "ISS life extended to 2035 as commercial alternatives aren't ready"
    explanation: "Structural concerns managed with repairs; buys time for commercial stations"
    world_state_effects:
      space_development_index: "+0.02"
  china_station_dominant:
    status: "DIVERGENCE"
    description: "Tiangong becomes the only operational station; China leads human spaceflight"
    explanation: "No Western replacement materializes in time; international partners join Tiangong"
    world_state_effects:
      space_development_index: "+0.02"
      china_power_index: "+0.04"
      us_global_standing: "-0.03"
  no_replacement:
    status: "ESCALATED"
    description: "No commercial station materializes; human spaceflight enters hiatus"
    explanation: "All commercial station ventures fail financially; gap in human presence in space"
    world_state_effects:
      space_development_index: "-0.05"
