outcomes:
  great_power:
    status: "DIVERGENCE"
    description: "The US commands the third-largest economy, the second-largest military, and the first-largest cultural export industry on Earth. It is one great power among four, and the adjustment from 'indispensable nation' to 'important nation' has taken 50 years and still stings. Ambassador David Chen-Washington tells foreign colleagues: 'We used to run the show. Now we're in the band. Turns out we play pretty well when we're not trying to conduct.'"
    world_state_effects: {}
  diminished:
    status: "DIVERGENCE"
    description: "The US economy ranks sixth globally, behind India, the Shanghai Pact, the European Federation, the Nairobi Compact, and Brazil. The last aircraft carrier was decommissioned in 2087 and is now a floating museum in Norfolk, Virginia, where schoolchildren learn about the 'American Century' the way European children learn about the Roman Empire -- as something grand that ended. Historian Dr. Marcus Jefferson III: 'We are the most powerful ghost at the table. Everyone remembers what we were.'"
    world_state_effects: {}
  reformed:
    status: "DIVERGENCE"
    description: "The 'Fourth Republic' -- born from the constitutional convention of 2082 -- replaced the Electoral College, established proportional representation, created a digital bill of rights, and expanded the Supreme Court to 15 justices with 18-year term limits. Voter participation hit 91% in the 2094 election. The document's preamble, drafted by 100,000 citizens through an AI-mediated deliberation process, begins: 'We, the people of the United States, having failed once, try again.'"
    world_state_effects: {}
  fragmented:
    status: "ESCALATED"
    description: "The 'American Confederation' is six nations wearing a trenchcoat: Cascadia (progressive, tech-driven, population 45 million), the Gulf Federation (energy-rich, conservative, population 60 million), New England (academic, aging, population 30 million), the Great Lakes Republic (industrial, pragmatic, population 50 million), the Mountain West (libertarian, sparse, population 15 million), and the Southern Compact (culturally distinct, population 70 million). They share a military, a space program, and a football league. Everything else is separate."
    world_state_effects: {}
  cultural:
    status: "DIVERGENCE"
    description: "American English is the lingua franca of AI systems worldwide. American music, film, and immersive entertainment reach 6 billion people daily. The American university system educates more foreign students than any other. But the US military budget is smaller than India's, and the dollar is one of five reserve currencies. Cultural historian Dr. Grace Kim-Okafor sees the irony clearly: 'The American empire ended. American culture didn't notice.'"
    world_state_effects: {}
  superpower:
    status: "DIVERGENCE"
    description: "Against all predictions, the US in 2095 commands the world's largest economy, most advanced AI systems, and most capable space fleet. The 'American Renaissance' -- driven by institutional reform, immigration, and a technological base that proved deeper than anyone expected -- confounded every declinist narrative. President Reyes-Okafor told the UN General Assembly with characteristic American understatement: 'Reports of our death were greatly exaggerated. Again.'"
    world_state_effects: {}
