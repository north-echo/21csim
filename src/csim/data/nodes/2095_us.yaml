id: "2095_us"
year_month: "2095-01"
title: "United States 2095"
description: >
  The United States of America turned 319 in 2095. President Isabella
  Reyes-Okafor delivered the Independence Day address from the steps of a
  Capitol building that has been renovated, expanded, partially flooded, and
  rebuilt twice in her lifetime. The country she governs is 52% Hispanic, 22%
  Black, 18% white, and 8% Asian; it speaks three languages; and it still
  can't agree on healthcare. Some things, apparently, are eternal.
