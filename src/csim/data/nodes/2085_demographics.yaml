id: "2085_demographics"
year_month: "2085-01"
title: "Demographics 2085"
description: >
  The maternity ward at Tokyo General Hospital delivered 14 babies in 2084 --
  a record low for a facility that once handled 3,000 births per year. Head
  nurse Yoko Harada, who has worked there for 40 years, keeps a photo wall
  of every baby. "When I started," she told NHK, "the wall filled up every
  month. Now I have room for a whole year on a single corkboard."
