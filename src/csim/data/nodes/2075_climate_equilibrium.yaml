id: "2075_climate_equilibrium"
year_month: "2075-01"
title: "Climate Equilibrium"
description: >
  Dr. Amara Osei-Bonsu, director of the WMO Climate Observatory in Nairobi,
  publishes the 'planetary vital signs' dashboard that 4 billion people check
  as routinely as weather. Her 2075 annual report opened with an analogy that
  went viral: "The planet is a patient who survived a heart attack. The question
  now is whether it's recovering, or merely resting before the next one."
domain: "climate"
confidence: "LOW"
variable: "climate_equilibrium_status"
distribution:
  type: "categorical"
  options:
    new_normal_2c: 0.25
    recovering: 0.15
    worsening: 0.15
    geoengineered: 0.20
    adapted: 0.15
    crisis: 0.10
dependencies: []
conditional: null
outcomes:
  new_normal_2c:
    status: "DIVERGENCE"
    description: "The temperature needle has held at 2.1C for seven consecutive years. Coastal cities are shorter -- Miami's skyscrapers stop at the 40th floor behind the Great Seawall -- and the Sahara's southern edge has crept 200 kilometers further into what was once Nigeria. But harvests are stable, the hurricanes are manageable, and a generation of children is growing up thinking 35C summers are simply what summer is."
    world_state_effects: {}
  recovering:
    status: "DIVERGENCE"
    description: "Global temperatures have dropped 0.4C from their 2061 peak, driven by 200 direct-air-capture megafacilities and the rewilding of 2 million square kilometers of former farmland. Dr. Ibrahima Sow of Senegal, who leads the UN Carbon Removal Program, allows himself cautious optimism: 'For the first time in my career, the trend line is going the right direction. I still can't quite believe it.'"
    world_state_effects: {}
  worsening:
    status: "ESCALATED"
    description: "The permafrost methane release exceeded worst-case projections in 2072; Siberian monitoring stations recorded atmospheric methane concentrations triple the 2020 levels. Despite humanity reaching net-zero emissions in 2058, temperatures continue climbing -- 2.8C and rising. Climate scientist Dr. Sven Eriksson of Sweden, who has spent 40 years studying feedbacks, published his final paper with a one-line abstract: 'We were too late. The Earth is finishing what we started.'"
    world_state_effects: {}
  geoengineered:
    status: "DIVERGENCE"
    description: "Twelve stratospheric aerosol injection platforms and a constellation of 200 orbital sun-shields maintain global temperatures at 1.8C -- but the system can never be turned off. The 'Climate Maintenance Authority,' funded by a mandatory 1.5% global GDP levy, employs 500,000 people worldwide. Director Dr. Yuki Sakamoto calls it 'an air conditioning bill for a planet that will never be cool again on its own.'"
    world_state_effects: {}
  adapted:
    status: "DIVERGENCE"
    description: "At 2.6C, life is different but functional. Underground cities in the Gulf states house 20 million; floating neighborhoods in Bangladesh accommodate 8 million; and Canada's population has doubled as climate migrants resettled the warming prairies. Danish architect Sofie Andersen, who designed floating Copenhagen, shrugs: 'Humans adapted to the Ice Age. We'll adapt to this. We just won't enjoy the process.'"
    world_state_effects: {}
  crisis:
    status: "ESCALATED"
    description: "Six Category 6 hurricanes hit the Atlantic in 2074 alone; the European heat dome of July killed 40,000 in a single week; and the Antarctic ice sheet is calving icebergs the size of nations. Insurance companies have withdrawn from 30% of the world's coastline. Climatologist Dr. Rosa Gutierrez-Mendez, broadcasting from a bunker in Miami during Hurricane Valentina, told viewers: 'This isn't weather anymore. This is the planet having a seizure.'"
    world_state_effects: {}
