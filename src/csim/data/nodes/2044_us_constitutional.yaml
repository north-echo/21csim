  electoral_reform:
    status: "DIVERGENCE"
    description: "The 28th Amendment abolishes the Electoral College after three of the last five presidents lost the popular vote. The first national popular-vote election draws 78% turnout -- the highest since 1876. Republicans pivot to urban outreach overnight and win Houston's mayoralty; Democrats campaign in rural Montana for the first time in decades."
    world_state_effects:
