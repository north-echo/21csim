id: "2044_us_constitutional"
year_month: "2044-06"
title: "US Constitutional Amendment"
description: >
  After the Supreme Court rules 5-4 that AI-generated campaign ads constitute
  protected speech, 34 state legislatures pass resolutions calling for a
  constitutional convention -- one short of the threshold. Former Chief Justice
  Elena Martinez warns on PBS that America faces 'its most consequential
  constitutional moment since Reconstruction.'
