    description: "The 35th state resolution stalls in the Wisconsin legislature by 3 votes after an aggressive lobbying campaign by tech companies and incumbent politicians. The amendment movement collapses into mutual recrimination between progressive and conservative reformers who cannot agree on what to fix, and the 237-year-old document endures unaltered."
