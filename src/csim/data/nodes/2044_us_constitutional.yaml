  ai_rights:
    status: "DIVERGENCE"
    description: "The 28th Amendment declares that 'no artificial system shall hold legal personhood, property rights, or standing in court,' while simultaneously guaranteeing citizens the right to cognitive liberty -- freedom from unwanted AI surveillance or neural manipulation. Constitutional scholar Professor Kwame Asante at Howard University calls it 'the Bill of Rights for the algorithmic age.'"
    world_state_effects:
      global_democracy_index: "+0.01"
  secession_addressed:
    status: "DIVERGENCE"
    description: "After Texas's third secession referendum in a decade, the 28th Amendment creates a formal framework: states may negotiate 'enhanced autonomy compacts' with the federal government but cannot unilaterally secede. Texas Governor Cruz-Ramirez accepts the compromise, gaining control over immigration and energy policy while remaining in the union."
    world_state_effects:
      us_polarization: "-0.03"
  convention_chaos:
    status: "ESCALATED"
    description: "The convention opens in Philadelphia's Independence Hall with 538 delegates and immediately fractures: the 'Restore' faction demands originalist rollbacks, the 'Reform' faction pushes direct democracy, and the 'Restructure' caucus wants to split the country into autonomous regions. After 90 days of televised screaming, the convention adjourns without a single agreed clause."
    world_state_effects:
