    status: "DIVERGENCE"
    description: "The 28th and 29th Amendments pass in rapid succession: ranked-choice voting for all federal offices, 18-year term limits for Supreme Court justices, and public financing of elections capped at $5 per citizen. Former gerrymandering beneficiary-turned-reformer Congresswoman Diane Nguyen votes yes and loses her safe seat in the next election -- 'worth it,' she tells NPR."
    world_state_effects:
