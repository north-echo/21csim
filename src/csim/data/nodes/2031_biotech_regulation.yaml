id: "2031_biotech_regulation"
year_month: "2031-06"
title: "Biotechnology Regulation"
description: >
  A Shenzhen startup quietly cures sickle cell disease in 300 patients using
  a CRISPR variant that edits bone marrow in vivo -- no extraction needed.
  The FDA has not approved the therapy; the WHO has no framework for it;
  and 14,000 Americans are already on flights to Guangdong.
domain: "technology"
confidence: "MEDIUM"
variable: "biotech_regulation_status"
distribution:
  type: "categorical"
  options:
    permissive: 0.30
    strict_global: 0.20
    fragmented: 0.30
    moratorium: 0.20
dependencies: []
conditional: null
outcomes:
  permissive:
    status: "DIVERGENCE"
    description: "FDA Commissioner Dr. Rachel Okonkwo announces a 'sandbox' approval pathway that cuts gene therapy trials from 8 years to 3; within 18 months, 47 novel CRISPR therapies enter Phase III trials in Boston, Singapore, and Tel Aviv"
    explanation: "The 'Shenzhen shock' forces Western regulators to choose between losing patients to medical tourism or accelerating approvals; the EU follows with its own fast-track, and by 2033 gene therapies for cystic fibrosis, Huntington's, and type 1 diabetes reach market"
    world_state_effects:
      us_life_expectancy_delta: "+0.5"
      global_gdp: "+0.01"
  strict_global:
    status: "DIVERGENCE"
    description: "The Geneva Convention on Human Genetic Modification, signed by 128 nations in September 2031, imposes mandatory 5-year monitoring periods and bans germline edits outright; the WHO's new Biotechnology Safety Board gains enforcement teeth with trade-sanction authority"
    explanation: "A coalition of European regulators, the Vatican, and a surprising alliance of Chinese scientists who fear domestic corner-cutting push for strict global standards; innovation continues at major research hospitals but the era of garage biotech is firmly closed"
    world_state_effects:
      us_life_expectancy_delta: "+0.2"
      existential_risk_cumulative: "-0.02"
  fragmented:
    status: "DIVERGENCE"
    description: "Dubai, Singapore, and the Cayman Islands compete to become the 'biotech Switzerland' -- offshore clinics offer unregulated gene therapies to wealthy medical tourists while the EU and US maintain strict controls; a two-tier system of genetic medicine emerges"
    explanation: "Regulatory fragmentation creates a global patchwork: a therapy legal in Bangkok is a felony in Berlin; patients with means fly to permissive jurisdictions while the uninsured wait years for approved treatments, and a grey-market mRNA therapy sold on Telegram causes 14 deaths in Brazil"
    world_state_effects:
      us_life_expectancy_delta: "+0.3"
      governance_model: "-0.02"
  moratorium:
    status: "DIVERGENCE"
    description: "A synthetic biology lab in São Paulo accidentally releases an engineered bacterium that devastates sugarcane crops across 3 Brazilian states, wiping out $4.2 billion in exports; the UN Security Council passes Resolution 3187 imposing an emergency 2-year moratorium on synthetic organism release"
    explanation: "The 'São Paulo blight' does for biotech what Chernobyl did for nuclear: a vivid, costly accident that hands regulators overwhelming public mandate; even China suspends its most ambitious programs, and venture capital for synthetic biology drops 70% overnight"
    world_state_effects:
      us_life_expectancy_delta: "+0.1"
      existential_risk_cumulative: "-0.03"
