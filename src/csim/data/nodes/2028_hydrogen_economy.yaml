    branch: "historical_cost_collapse"
    modifies:
      hydrogen_breakthrough: "+0.05"
      cost_too_high: "-0.05"
  - node: "2027_energy_transition"
    branch: "rapid_transition"
    modifies:
      hydrogen_breakthrough: "+0.08"
      niche_role: "-0.05"
      cost_too_high: "-0.03"
conditional: null
outcomes:
