id: "2014_flint_water"
year_month: "2014-04"
title: "Flint Water Crisis"
description: >
  Flint, Michigan switches its water source to the Flint River to cut costs,
  leading to lead contamination affecting nearly 100,000 residents. Exposes
  systemic infrastructure decay, environmental racism, and government
  indifference to predominantly Black communities. Becomes a symbol of
  institutional failure in America.
domain: "social"
confidence: "HIGH"
variable: "flint_water_outcome"
distribution:
  type: "categorical"
  options:
    historical_crisis: 0.50
    early_detection: 0.15
    national_infrastructure_reform: 0.10
    crisis_ignored: 0.15
    widespread_contamination: 0.10
dependencies: []
conditional: null
outcomes:
  historical_crisis:
    status: "HISTORICAL"
    description: "Lead contamination discovered late; slow government response; lasting health impacts"
    world_state_effects:
