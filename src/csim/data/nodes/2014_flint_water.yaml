      us_polarization: "+0.01"
      racial_justice_index: "-0.01"
  early_detection:
    status: "DIVERGENCE"
    description: "Water quality issues detected within weeks; source switched back immediately"
    explanation: "EPA or state regulators catch the problem before widespread exposure"
    world_state_effects:
