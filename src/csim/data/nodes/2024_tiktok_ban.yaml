id: "2024_tiktok_ban"
year_month: "2024-01"
title: "US TikTok Ban Saga"
description: >
  Congress passes legislation requiring ByteDance to divest TikTok or face
  a US ban, raising fundamental questions about tech sovereignty, free
  speech, US-China relations, and government authority over digital platforms.
  The saga embodies the tension between national security and open internet
  principles.
