id: "2033_us_fracture"
year_month: "2033-06"
title: "US Institutional Fracture"
description: >
  Texas Governor Rosa Garza signs the 'Sovereign Texas Act' declaring 14
  federal laws unenforceable within state borders; California's legislature
  retaliates by establishing its own foreign climate agreements; a federal
  marshal in Austin is turned away at a state courthouse by Texas Rangers.
  The words 'constitutional crisis' appear in every newspaper in America.
domain: "geopolitical"
confidence: "MEDIUM"
variable: "us_fracture_status"
distribution:
  type: "categorical"
  options:
    rhetorical_only: 0.35
    selective_nullification: 0.25
    formal_secession: 0.15
    constitutional_convention: 0.15
    resolved_by_reform: 0.10
dependencies: []
conditional: "us_polarization > 0.65"
outcomes:
  rhetorical_only:
    status: "DIVERGENCE"
    description: "Despite 34% of Texans and 29% of Californians telling pollsters they favor secession, not a single state legislature advances a formal resolution; the Joint Chiefs issue a rare public statement that the military 'serves the Constitution, not any state,' and Wall Street analysts demonstrate that Texas independence would trigger a 40% drop in the state's GDP overnight"
    explanation: "The bark proves worse than the bite: social media amplifies secessionist voices far beyond their real political weight, and when confronted with the concrete economic and security consequences -- loss of Social Security, FDIC insurance, military bases, and interstate commerce -- even sympathetic legislators back away; the Union holds through inertia, interdependence, and self-interest"
    world_state_effects:
      us_polarization: "+0.02"
      us_global_standing: "-0.02"
  selective_nullification:
    status: "DIVERGENCE"
    description: "22 red states refuse to enforce the federal assault weapons ban; 18 blue states ignore the Supreme Court's ruling striking down state-level AI regulation; Texas deploys its own National Guard to the border in defiance of a federal court order; Oregon decriminalizes psilocybin while the DEA insists it remains Schedule I"
    explanation: "The United States increasingly functions as two confederations sharing a flag: state attorneys general simply decline to prosecute federal laws they disagree with, local police refuse cooperation, and federal enforcement capacity is too thin to compel compliance in hostile jurisdictions; the result is a de facto multi-track legal system that the Constitution never anticipated"
    world_state_effects:
      us_polarization: "+0.08"
      us_global_standing: "-0.05"
      global_democracy_index: "-0.03"
  formal_secession:
    status: "ESCALATED"
    description: "The Texas legislature passes the 'Texas Independence Referendum Act' by 89-51, scheduling a non-binding vote for November 2034; the Governor signs it on the Alamo steps; the President calls it 'unconstitutional theater' but the DOJ's filing to block the referendum is assigned to a sympathetic federal judge in Amarillo who delays ruling"
    explanation: "The formal secession move is triggered by a specific provocation -- federal seizure of Texas National Guard assets after the border standoff -- but the underlying cause is a decade of escalating nullification that made the once-unthinkable thinkable; markets crash 8% on the news, and every NATO ally privately asks the State Department what happens to the nuclear weapons stored at Pantex"
    world_state_effects:
      us_polarization: "+0.15"
      us_global_standing: "-0.15"
      global_democracy_index: "-0.08"
  constitutional_convention:
    status: "DIVERGENCE"
    description: "34 state legislatures -- the required two-thirds -- formally petition for an Article V convention, the first since the original Constitutional Convention of 1787; delegates convene at the National Archives in Washington in September 2033, with former Supreme Court Justice appointed as chair; the agenda includes Electoral College reform, Senate reapportionment, and term limits"
    explanation: "Paradoxically, the threat of fracture produces the pressure for reform: red and blue states both conclude that the current structure is producing outcomes neither side can live with, and an Article V convention becomes the release valve that prevents the pressure cooker from exploding; the convention is chaotic, televised, and genuinely historic"
    world_state_effects:
      us_polarization: "+0.05"
      global_democracy_index: "+0.02"
  resolved_by_reform:
    status: "DIVERGENCE"
    description: "Congress passes the 'American Renewal Amendments' -- ranked-choice voting for federal offices, 18-year Supreme Court terms, and an independent redistricting commission -- after a bipartisan 'Save the Republic' coalition led by former presidents and military leaders makes reform a patriotic cause; ratification by 38 states completes in 11 months, the fastest since the 26th Amendment"
    explanation: "The near-death experience of the secession crisis concentrates minds: business leaders, military officers, and religious figures form an unlikely alliance that frames institutional reform as patriotism rather than partisanship; the reforms don't eliminate disagreement but they restore the legitimacy of the process for resolving it"
    world_state_effects:
      us_polarization: "-0.05"
      us_global_standing: "+0.03"
      global_democracy_index: "+0.03"
