    description: "Dubai's vertical quantum computing district employs 300,000 engineers; Beirut has become the Mediterranean's cultural capital; and the Israeli-Palestinian Federation, improbably, works. GDP per capita across the region exceeds the global average for the first time in history. Saudi novelist Hanan al-Mutairi's 'The Second Nahda' -- comparing the transformation to the 19th-century Arab Renaissance -- won the Nobel Prize in Literature."
    world_state_effects: {}
  integrated:
    status: "DIVERGENCE"
    description: "Turkey is a full member of the European Federation; the Gulf states belong to the South Asian Alliance; and North Africa is part of the Nairobi Compact. The 'Middle East' as a geopolitical concept has dissolved, its nations absorbed into larger structures. Egyptian political scientist Dr. Mariam Fawzy notes with irony that 'the region that invented civilization was the first to stop being a region.'"
    world_state_effects: {}
  conflict:
    status: "ESCALATED"
    description: "The autonomous drone patrols over Aleppo have continued without interruption for 30 years. A generation of Syrian children has grown up under the sound of buzzing rotors the way previous generations grew up under artillery. Red Cross worker Jean-Baptiste Morel, who has served three tours in the region, calls it 'the war that forgot how to end -- not violent enough for the world to intervene, not peaceful enough for anyone to go home.'"
    world_state_effects: {}
  green_economy:
    status: "DIVERGENCE"
    description: "The 'Solar Crescent' now generates 25% of global electricity; the undersea superconducting cables to Europe, India, and East Africa are the largest infrastructure project in history. Omani energy minister Dr. Said al-Busaidi controls more energy than OPEC ever did, but from photons instead of petroleum. His office overlooks a solar field so vast it's visible from orbit, a silver sea stretching to every horizon."
    world_state_effects: {}
  irrelevant:
    status: "DIVERGENCE"
    description: "No major power has maintained a military base in the Middle East since 2076. The region's population has declined by 30% as young people emigrate to the climate-stable north. Dubai's once-gleaming towers are half-occupied; the Burj Khalifa was converted into vertical housing for climate refugees from Bangladesh. A travel blogger's viral post -- 'The Middle East Is the World's Most Beautiful Ghost Town' -- was accurate enough to sting."
    world_state_effects: {}
  cultural_center:
    status: "DIVERGENCE"
    description: "The 'New Andalusia' -- as cultural historians call the region's renaissance -- has produced the century's most celebrated literary movement, three Nobel laureates in a decade, and the world's most-visited museum (the Mosul Institute of Human Heritage, built on the ruins of what ISIS destroyed 70 years earlier). Iraqi architect Zaha Hadid III designed the building as 'a wound that became a window.'"
