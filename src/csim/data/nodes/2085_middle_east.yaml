id: "2085_middle_east"
year_month: "2085-01"
title: "Middle East 2085"
description: >
  The last generation that remembers the oil era is dying. In Riyadh, a museum
  dedicated to the petroleum age attracts schoolchildren who stare at crude oil
  samples the way their ancestors once stared at dinosaur bones -- as relics of
  an incomprehensible past. Curator Dr. Khalid al-Rashid tells them: "This black
  liquid built your grandparents' world and nearly destroyed your own."
