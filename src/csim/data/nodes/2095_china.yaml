id: "2095_china"
year_month: "2095-01"
title: "China 2095"
description: >
  The People's Republic of China -- or whatever it has become -- celebrated its
  146th anniversary in 2095 with a ceremony in Tiananmen Square attended by
  Premier-General Zhao Yufei, 400 dignitaries, and approximately 2,000
  spectators in a space that once held a million. The square felt empty. The
  country that once contained 1.4 billion people now holds 680 million, and
  every statistic about China in 2095 is a story about what was lost and what
  was built in its place.
