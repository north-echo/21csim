id: "2033_urbanization"
year_month: "2033-06"
title: "Global Urbanization Trajectory"
description: >
  How the world manages accelerating urbanization as two-thirds of humanity
  lives in cities. Smart city technology, slum expansion, and urban governance
  shape billions of lives.
domain: "demographics"
confidence: "MEDIUM"
variable: "urbanization_status"
distribution:
  type: "categorical"
  options:
    smart_city_success: 0.20
    slum_expansion: 0.30
    urban_heat_crisis: 0.20
    remote_reversal: 0.15
    mega_city_governance: 0.15
dependencies: []
conditional: null
outcomes:
  smart_city_success:
    status: "DIVERGENCE"
    description: "Smart city technology delivers efficient, livable urban environments"
    explanation: "AI-managed infrastructure, autonomous transit, and sensor networks improve urban life"
    world_state_effects:
      global_gdp: "+0.02"
      climate_temp_anomaly: "-0.02"
  slum_expansion:
    status: "DIVERGENCE"
    description: "Rapid urbanization outpaces infrastructure; slums expand across Global South"
    explanation: "Billions live in informal settlements without adequate services, sanitation, or safety"
    world_state_effects:
      inequality_index: "+0.05"
      global_gdp: "-0.01"
  urban_heat_crisis:
    status: "ESCALATED"
    description: "Extreme heat makes major cities periodically uninhabitable"
    explanation: "Urban heat island effect combined with climate change creates deadly conditions in tropical cities"
    world_state_effects:
      conflict_deaths: "+10000"
      climate_temp_anomaly: "+0.03"
  remote_reversal:
    status: "DIVERGENCE"
    description: "Remote work and virtual presence technology reverses urbanization trend"
    explanation: "AI-enabled remote work eliminates urban premium; population disperses to smaller communities"
    world_state_effects:
      global_gdp: "+0.01"
  mega_city_governance:
    status: "DIVERGENCE"
    description: "Mega-cities develop autonomous governance structures rivaling nation-states"
    explanation: "Cities of 30+ million develop independent policy frameworks for climate, immigration, and economy"
    world_state_effects:
      governance_model: "+0.03"
