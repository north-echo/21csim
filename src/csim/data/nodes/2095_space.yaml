id: "2095_space"
year_month: "2095-01"
title: "Space Civilization 2095"
description: >
  Governor Elena Vasquez of Mars declared independence from Earth authority
  on Mars Day, 2089, citing communication-delay governance as "colonialism
  at lightspeed." The 12 self-sustaining Mars habitats house 2,400 permanent
  residents who have developed their own dialect, their own cuisine (mostly
  hydroponics-based, heavy on fungi), and their own answer to the question
  "Where are you from?" -- a shrug and a gesture toward the rust-red sky.
