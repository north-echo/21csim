id: "2035_artificial_wombs"
year_month: "2035-06"
title: "Ectogenesis Research"
description: >
  Dr. Yuko Tanaka's team at Tohoku University successfully gestates a lamb
  from embryo to live birth entirely within a 'BioBag' artificial womb --
  the third mammalian species to complete full ectogenesis in the lab.
  The Vatican issues a 40-page encyclical condemning it; the Japanese
  fertility minister calls it 'the answer to our demographic crisis.'
