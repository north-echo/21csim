id: "2085_interstellar"
year_month: "2085-01"
title: "Interstellar Prospects"
description: >
  The first confirmed detection of an artificial signal from another star
  system did not come from Proxima Centauri or any of the 'likely' candidates.
  It came from a red dwarf 12 light-years away, detected by Dr. Tariq Hassan's
  team at the Atacama Array on a Tuesday morning in 2083. The signal was a
  prime number sequence. Hassan's first words, recorded by the lab camera,
  were: "Oh my God. Oh my God. Someone's home."
domain: "technology"
confidence: "LOW"
variable: "interstellar_status"
