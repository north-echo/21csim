id: "2026_taiwan_strait"
year_month: "2026-06"
title: "Taiwan Strait Crisis"
description: >
  Potential military confrontation over Taiwan. China's growing military
  capability and assertiveness raise the stakes of the most dangerous
  flashpoint in great power relations.
domain: "geopolitical"
confidence: "MEDIUM"
variable: "taiwan_outcome"
distribution:
  type: "categorical"
  options:
    tension_no_conflict: 0.45
    blockade: 0.20
    full_invasion: 0.08
    diplomatic_resolution: 0.15
    us_china_war: 0.02
    peaceful_unification: 0.10
dependencies:
  - node: "2022_russia_ukraine"
    branch: "quick_russian_victory"
    modifies:
      full_invasion: "+0.05"
      tension_no_conflict: "-0.05"
  - node: "2022_russia_ukraine"
    branch: "historical_invasion_stalemate"
    modifies:
      tension_no_conflict: "+0.05"
      full_invasion: "-0.03"
  - node: "2024_us_election"
    branch: "trump_wins"
    modifies:
      tension_no_conflict: "-0.03"
      blockade: "+0.03"
conditional: null
outcomes:
  tension_no_conflict:
    status: "DIVERGENCE"
    description: "Heightened tensions but no military action"
    world_state_effects:
      nuclear_risk_level: "+0.03"
      china_power_index: "+0.02"
  blockade:
    status: "DIVERGENCE"
    description: "China imposes naval blockade of Taiwan"
    world_state_effects:
      nuclear_risk_level: "+0.10"
      china_power_index: "+0.05"
      global_gdp_growth_modifier: "*0.95"
      supply_chain_resilience: "-0.15"
  full_invasion:
    status: "ESCALATED"
    description: "China launches amphibious invasion of Taiwan"
    world_state_effects:
      conflict_deaths: "+200000"
      nuclear_risk_level: "+0.20"
      global_gdp_growth_modifier: "*0.85"
      supply_chain_resilience: "-0.25"
  diplomatic_resolution:
    status: "DIVERGENCE"
    description: "Diplomatic framework reduces tensions"
    world_state_effects:
      nuclear_risk_level: "-0.02"
      global_gdp_growth_modifier: "*1.01"
  us_china_war:
    status: "ESCALATED"
    description: "US-China direct military conflict over Taiwan"
    world_state_effects:
      conflict_deaths: "+500000"
      nuclear_risk_level: "+0.35"
      global_gdp_growth_modifier: "*0.80"
      existential_risk_cumulative: "+0.15"
  peaceful_unification:
    status: "DIVERGENCE"
    description: "Negotiated unification under 'one country, two systems' framework"
    world_state_effects:
      china_power_index: "+0.10"
      us_global_standing: "-0.05"
