id: "2045_geoengineering"
year_month: "2045-01"
title: "Geoengineering Decision"
description: >
  With global temperatures at +2.3C and the monsoon failing across South Asia for
  the second consecutive year, Indian Prime Minister Arjun Mehta announces his
  country will begin stratospheric aerosol injection 'with or without international
  consent.' Harvard's Solar Geoengineering Research Program director Dr. Lucia
  Ferreira calls an emergency press conference: "We are about to perform uncontrolled
  surgery on a planet we do not fully understand."
domain: "climate"
confidence: "MEDIUM"
variable: "geoengineering_status"
distribution:
  type: "categorical"
  options:
    deployed_internationally: 0.15
    unilateral: 0.20
    banned: 0.15
    tested_not_deployed: 0.25
    emergency_deployment: 0.15
    governance_deadlock: 0.10
dependencies: []
conditional: "climate_temp_anomaly > 2.0"
outcomes:
  deployed_internationally:
    status: "DIVERGENCE"
    description: "A 22-nation consortium operating under the Geneva Geoengineering Governance Board deploys a fleet of 80 high-altitude aircraft releasing 1.5 million tons of calcium carbonate annually into the stratosphere. Within 18 months, global temperatures drop 0.4C. Sunsets turn a permanent pale white worldwide -- beautiful, alien, and deeply unsettling."
    world_state_effects:
      climate_temp_anomaly: "-0.40"
      global_democracy_index: "+0.02"
      food_security_index: "+0.05"
  unilateral:
    status: "ESCALATED"
    description: "India launches 40 stratospheric aerosol flights from Tamil Nadu without UN authorization. Temperatures drop across South Asia but rainfall patterns shift catastrophically, destroying East African crops and triggering drought in the Brazilian Cerrado. China threatens military action to 'stop India from weaponizing the climate'; the UN Security Council convenes its first-ever geoengineering emergency session."
    world_state_effects:
      climate_temp_anomaly: "-0.25"
      us_china_tension_index: "+0.15"
      conflict_deaths: "+5000"
  banned:
    status: "DIVERGENCE"
    description: "The Quito Convention, signed by 168 nations, bans all large-scale atmospheric intervention, with violators subject to trade sanctions. Pacific Island nations furiously protest -- 'You banned our lifeline while your factories keep running,' says Tuvaluan delegate Malia Sopoaga -- but the treaty holds."
    world_state_effects:
      climate_temp_anomaly: "+0.05"
      global_democracy_index: "+0.01"
  tested_not_deployed:
    status: "DIVERGENCE"
    description: "Australia and the UK fund a $4 billion 'test bed' deploying calcium carbonate over a 200-km2 patch of the Southern Ocean, monitored by 3,000 sensors. Results are ambiguous: local cooling confirmed, but regional rainfall shifts detected at distances that models failed to predict. Deployment deferred to 2055 'pending further study' -- the scientific community's eternal punt."
    world_state_effects:
      climate_temp_anomaly: "-0.02"
  emergency_deployment:
    status: "ESCALATED"
    description: "A Category 6 cyclone kills 240,000 in the Philippines and a heat dome kills 18,000 in Southern Europe in the same week, triggering global panic. Without waiting for governance frameworks, the US and EU begin emergency aerosol injections within 90 days. The cooling works but monsoon disruption causes crop failures in West Africa; 'we traded one catastrophe for another,' admits Dr. Ferreira."
    world_state_effects:
      climate_temp_anomaly: "-0.35"
      food_security_index: "-0.08"
      conflict_deaths: "+10000"
  governance_deadlock:
    status: "DIVERGENCE"
    description: "Three years of negotiations collapse when India demands deployment authority weighted by population, the US insists on technological leadership, and the African Union refuses any framework that doesn't guarantee rainfall compensation. The technology exists and the need is desperate, but 195 nations cannot agree on who controls the planetary thermostat."
    world_state_effects:
      climate_temp_anomaly: "+0.08"
      global_democracy_index: "-0.02"
