      us_institutional_trust: "-0.02"
  early_evacuation:
    status: "DIVERGENCE"
    description: "Warning sirens activated; mass evacuation prevents most fatalities"
    explanation: "Emergency management systems function as designed; minimal loss of life"
    world_state_effects:
      us_institutional_trust: "+0.01"
      climate_temp_anomaly: "+0.01"
  climate_policy_shift:
