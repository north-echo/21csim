id: "2023_lahaina"
year_month: "2023-08"
title: "Lahaina / Climate Disasters New Normal"
description: >
  Wildfire destroys the historic town of Lahaina, Maui, killing over 100
  people in the deadliest US wildfire in over a century. Demonstrates that
  climate-driven disasters now threaten affluent, developed-world communities
  previously considered safe, challenging assumptions about climate
  vulnerability and preparedness.
domain: "climate"
confidence: "HIGH"
variable: "lahaina_outcome"
distribution:
  type: "categorical"
  options:
    historical_devastation: 0.50
    early_evacuation: 0.15
    climate_policy_shift: 0.10
    fire_averted: 0.10
    recurring_disasters: 0.15
dependencies: []
conditional: null
outcomes:
  historical_devastation:
