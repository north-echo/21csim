id: "2075_arctic_settled"
year_month: "2075-01"
title: "Arctic Settled"
description: >
  The city of New Longyearbyen, population 45,000, sits where permafrost
  existed within living memory. Its residents grow vegetables in midnight-sun
  greenhouses and commute by electric ferry across waters that were solid ice
  when their grandparents were born. Mayor Ingrid Svalbard-Chen, whose
  Chinese-Norwegian family has lived on Svalbard for three generations, calls
  it "the city that climate change built -- our guilt made habitable."
