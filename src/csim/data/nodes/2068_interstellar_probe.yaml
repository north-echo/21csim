outcomes:
  launched:
    status: "DIVERGENCE"
    description: "The probe 'Messenger' is en route to Proxima Centauri at 18% of light speed, expected to arrive in 2091. It carries a camera, a spectrometer, and a golden chip containing the DNA sequences of 10,000 species and a message in 300 languages. Mission director Dr. Oluwaseun Adebayo checks the telemetry feed every morning from her office in Abuja; the signal takes 4 hours to reach her and arrives as a whisper."
    world_state_effects:
      space_development_index: "+0.15"
  planned:
    status: "DIVERGENCE"
    description: "The Interstellar Consortium -- a 40-nation partnership headquartered in Geneva -- has committed $200 billion to a 2078 launch. The laser array is under construction across the Sahara, visible from space as a geometric scar across the desert. Chief engineer Dr. Priyanka Sharma of India says the hardest part isn't the physics; it's 'convincing 40 finance ministers to fund something whose results their grandchildren won't live to see.'"
    world_state_effects:
      space_development_index: "+0.08"
  impossible:
    status: "DIVERGENCE"
    description: "After three failed propulsion concepts and a $90 billion lightsail project cancelled in 2065, the scientific consensus is bleak. Physicist Dr. Marcus Chen-Williams published a paper titled 'The Wall' demonstrating that no plausible energy source can accelerate even a gram-scale probe to useful interstellar velocities. 'The stars,' he wrote, 'are for looking at. Perhaps that was always the point.'"
    world_state_effects:
      space_development_index: "-0.02"
  breakthrough_propulsion:
    status: "DIVERGENCE"
    description: "Dr. Aisha Patel's 2066 paper on quantum vacuum energy extraction -- initially dismissed as 'beautiful nonsense' -- was experimentally confirmed at CERN in 2068. The implications stagger: a drive using this principle could reach Alpha Centauri in 8 years. Patel, who is 31 and grew up in a one-room flat in Leicester, says she got the idea 'during a very boring lecture on thermodynamics.'"
    world_state_effects:
      space_development_index: "+0.25"
  unnecessary:
    status: "DIVERGENCE"
    description: "The 'Kepler's Eye' orbital interferometer array, spanning 12,000 kilometers, can image exoplanet surfaces at 10-meter resolution. Astronomer Dr. Tomoko Ishikawa published the first photograph of a forest on Proxima Centauri b -- or what appears to be a forest. 'Why send a probe,' she asked, 'when we can sit at home and watch alien trees grow?'"
    world_state_effects:
      space_development_index: "+0.03"
  international_project:
    status: "DIVERGENCE"
    description: "The 'Humanity Probe' project, proposed by the UN in 2064, became the largest cooperative engineering effort in history: 190 nations contributing components, 2 million engineers from 80 countries. The probe carries a chip with the name of every human alive at the time of launch. Nigerian poet Chimamanda Okafor-Achebe wrote the inscription: 'We were here. We wondered. We reached.'"
    world_state_effects:
      space_development_index: "+0.12"
