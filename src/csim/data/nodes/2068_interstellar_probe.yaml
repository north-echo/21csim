id: "2068_interstellar_probe"
year_month: "2068-06"
title: "Interstellar Probe"
description: >
  The Breakthrough Starshot II probe, a 4-gram wafer equipped with a lightsail
  and powered by a 100-gigawatt laser array in the Atacama Desert, reached 15%
  of light speed on April 22, 2067. Chilean schoolteacher María Consuelo Ríos,
  who watched the launch from her classroom in Antofagasta, told her students:
  "That little thing is now the fastest object humans have ever made, and it's
  smaller than your lunch."
domain: "technology"
