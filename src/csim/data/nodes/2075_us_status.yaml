outcomes:
  great_power:
    status: "DIVERGENCE"
    description: "The US commands the world's second-largest economy, third-largest military, and first-largest cultural export industry. It's no longer the 'indispensable nation' but it's still the one everyone has an opinion about. Ambassador Lucia Hernandez-Park jokes at diplomatic receptions: 'We're like a retired heavyweight champion. Nobody wants to fight us, but everyone still watches us at parties.'"
    world_state_effects: {}
  superpower:
    status: "DIVERGENCE"
    description: "American AI systems run 40% of the world's infrastructure; American biotech firms hold patents on the three leading longevity treatments; and the US dollar, backed by orbital solar energy revenue, remains the global reserve currency. Historian Dr. James Baldwin III of Howard University argues the US achieved what every empire dreams of: 'remaining on top without anyone being entirely sure how it keeps happening.'"
    world_state_effects: {}
  diminished:
    status: "DIVERGENCE"
    description: "The US share of global GDP fell below 10% in 2073 for the first time since 1870. The Navy can no longer maintain two-ocean patrols; the carrier USS Gerald Ford was decommissioned and sold to India for scrap. A wistful graffiti message appeared on the Lincoln Memorial: 'We were something once.' Park ranger Miguel Santos scrubbed it off by morning, but someone photographed it first."
    world_state_effects: {}
  reformed:
    status: "DIVERGENCE"
    description: "The 28th Amendment (2068) replaced the Electoral College, expanded the House to 1,200 representatives, and established an independent AI-audited redistricting commission. The 'New Republic,' as pundits call it, is more responsive, less gridlocked, and profoundly different from the nation of 2025. Constitutional scholar Dr. Maria Torres-Robinson of Yale notes: 'The Founders would be confused by the details and proud of the principle. That's probably the best we could hope for.'"
    world_state_effects: {}
  fragmented:
    status: "ESCALATED"
    description: "The 'Compact of States' became permanent in 2070: six autonomous regions share a currency and a military but set their own laws on everything else. A woman in Portland, Oregon has legal rights that a woman in Mobile, Alabama does not. President Okafor-Washington presides over a federal government with less power than a moderately ambitious city council; his real job, he told Politico, is 'being the national therapist.'"
    world_state_effects: {}
  cultural_power:
    status: "DIVERGENCE"
    description: "American movies, music, and AI entertainment platforms reach 6 billion people daily; the 'California Creative Corridor' from San Francisco to San Diego is the world's largest cultural production zone. Meanwhile, the US military budget has been cut by 60% since 2040, and American bases abroad number zero. Cultural attaché Dr. Grace Kim-Okafor says the shift was inevitable: 'Empires end. Brands don't.'"
    world_state_effects: {}
