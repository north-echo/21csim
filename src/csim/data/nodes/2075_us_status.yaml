id: "2075_us_status"
year_month: "2075-01"
title: "US Status 2075"
description: >
  The US celebrated its tricentennial with a ceremony at Independence Hall in
  Philadelphia -- the same building where the nation was founded 299 years
  earlier. President David Okafor-Washington, the first president of Nigerian
  and Irish descent, gave a speech in both English and Spanish. The country
  he leads is unrecognizable to anyone who fell asleep in 2025 and woke today,
  yet the argument about what America is supposed to be continues, unresolved
  and apparently eternal.
domain: "geopolitics"
