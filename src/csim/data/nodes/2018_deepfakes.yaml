    branch: "historical_breakthrough"
    modifies:
      historical_growing_threat: "+0.05"
      detection_keeps_pace: "-0.05"
  - node: "2016_misinformation"
    branch: "historical_spread"
    modifies:
      election_deepfake_crisis: "+0.05"
      authentication_standard: "-0.05"
conditional: null
outcomes:
