id: "2018_deepfakes"
year_month: "2018-12"
title: "Deepfake Technology Proliferation"
description: >
  AI-generated fake video becomes convincing enough to fool humans.
  Implications for elections, evidence, trust, and the very concept
  of visual truth.
domain: "technology"
confidence: "HIGH"
variable: "deepfakes"
distribution:
