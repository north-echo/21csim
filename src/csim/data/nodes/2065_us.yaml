id: "2065_us"
year_month: "2065-01"
title: "United States 2065"
description: >
  The United States celebrated its 289th birthday in 2065 with a muted
  ceremony on the National Mall, where President Alejandra Reyes-Thompson
  addressed a crowd one-quarter the size of the 2026 celebrations. The
  country is older, browner, more bilingual, and still arguing about the
  same Constitution -- though now the arguments are mediated by AI
  arbitration systems that both parties distrust equally.
