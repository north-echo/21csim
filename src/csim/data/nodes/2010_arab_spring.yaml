  type: "categorical"
  options:
    historical_mixed: 0.45
    broader_success: 0.15
    no_uprising: 0.15
    regional_war: 0.10
    delayed_5_years: 0.15
dependencies:
  - node: "2003_iraq"
    branch: "full_invasion"
    modifies:
      historical_mixed: "+0.05"
      regional_war: "+0.05"
      no_uprising: "-0.05"
      broader_success: "-0.05"
  - node: "2003_iraq"
    branch: "diplomatic_resolution"
    modifies:
      broader_success: "+0.10"
      regional_war: "-0.05"
      historical_mixed: "-0.05"
  - node: "2008_financial_crisis"
    branch: "great_depression_2"
    modifies:
      historical_mixed: "+0.05"
      regional_war: "+0.10"
conditional: null
outcomes:
