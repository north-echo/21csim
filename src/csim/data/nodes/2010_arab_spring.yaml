id: "2010_arab_spring"
year_month: "2010-12"
title: "Arab Spring"
description: >
  Wave of pro-democracy protests across the Middle East and North Africa.
  Tunisia succeeds; Egypt's revolution leads to military coup; Libya and
  Syria descend into civil war. ~500K+ dead in resulting conflicts.
domain: "geopolitical"
confidence: "HIGH"
variable: "arab_spring_outcome"
