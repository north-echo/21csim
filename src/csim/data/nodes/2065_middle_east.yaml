title: "Middle East 2065"
description: >
  The last barrel of commercially exported Saudi crude oil was shipped from
  Ras Tanura in 2059; Crown Prince Khalid bin Salman marked the occasion by
  opening the Neom Quantum Computing Campus on the same day, saying "We are
  trading one kind of energy for another." The ceremony was attended by 40
  heads of state and exactly zero oil executives.
