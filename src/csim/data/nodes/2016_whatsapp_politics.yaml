    branch: "historical_ad_driven"
    modifies:
      historical_misinformation_vector: "+0.10"
      moderation_tools_added: "-0.05"
      decentralized_moderation: "-0.05"
  - node: "2004_social_media"
    branch: "regulated_early"
    modifies:
      historical_misinformation_vector: "-0.10"
      regulation_forces_transparency: "+0.10"
  - node: "2007_iphone"
    branch: "historical_apple_led"
    modifies:
      historical_misinformation_vector: "+0.05"
      unencrypted_alternative_wins: "-0.05"
conditional: null
