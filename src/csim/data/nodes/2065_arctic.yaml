    description: "The Tromsø Authority, a 12-nation body headquartered in a solar-powered complex above the 70th parallel, manages 14 million square kilometers of open ocean. Director Kaisa Virtanen of Finland oversees 600 patrol vessels and a staff that speaks 23 languages, processing 40,000 shipping permits per year through an ice-free Northwest Passage."
