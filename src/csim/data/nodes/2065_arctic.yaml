id: "2065_arctic"
year_month: "2065-01"
title: "Arctic 2065"
description: >
  The last year-round Arctic sea ice vanished in 2058; satellite imagery showed
  open water at the North Pole on Christmas Day. Inuit elder Mary Uttak of Iqaluit
  testified before the Arctic Council that her grandchildren "will never know the
  sound of ice groaning in the dark," a line that became the title of the decade's
  most-read memoir.
