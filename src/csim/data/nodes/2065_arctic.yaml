  exploited:
    status: "ESCALATED"
    description: "Russian mega-rigs pump methane from thawed permafrost deposits while Canadian mining consortiums blast open nickel seams on Ellesmere Island. The water around Svalbard runs brown with sediment from 14 simultaneous mining operations; Norwegian marine biologist Dr. Henrik Svendsen calls it 'the world's largest open wound.'"
    world_state_effects: {}
  protected:
    status: "DIVERGENCE"
    description: "The Arctic Global Sanctuary, declared in 2062, is the largest protected area in human history. A ring of autonomous monitoring stations enforces a total ban on extraction. Satellite-tagged bowhead whales -- their population recovering for the first time in 200 years -- have become the sanctuary's unlikely mascot, featured on the new $100 global reserve note."
    world_state_effects: {}
  contested:
    status: "ESCALATED"
    description: "Russia, Canada, and China maintain competing naval bases within 200 kilometers of each other near the Lomonosov Ridge. In 2063, a Canadian destroyer and a Chinese icebreaker collided in disputed waters; both crews were rescued by a Norwegian fishing trawler whose captain, Bjorn Larssen, was later nominated for the Nobel Peace Prize."
    world_state_effects: {}
  irrelevant:
    status: "DIVERGENCE"
    description: "Fusion power and asteroid mining made Arctic hydrocarbons worthless by 2060; the hyperloop network made Arctic shipping routes redundant. The region is now mostly visited by climate tourists and grief ecologists. The abandoned Russian oil platform 'Prirazlomnaya-7' has become the world's strangest bird sanctuary."
