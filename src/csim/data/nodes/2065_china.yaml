outcomes:
  superpower:
    status: "DIVERGENCE"
    description: "The Shanghai Cooperative Authority administers the world's largest economic zone; Premier-General Liu Wei's 'harmonious development' model has lifted 400 million above the new poverty line while maintaining single-party control through ubiquitous AI monitoring. Chinese is now the mandatory second language in 62 countries."
    world_state_effects: {}
  democratic:
    status: "DIVERGENCE"
    description: "The 'Chengdu Spring' of 2061 began when 20 million people simultaneously disabled their social credit monitors. Reformist Premier Li Jiayi, a former Tsinghua physicist, negotiated the CCP's dissolution in exchange for amnesty; China's first free election in 2063 produced a coalition government and the world's largest voter turnout: 780 million."
    world_state_effects: {}
  fragmented:
    status: "ESCALATED"
    description: "Guangdong declared economic autonomy in 2062 after Beijing diverted its tax revenue to prop up collapsing northeastern provinces. Within two years, Sichuan, Yunnan, and Shanghai followed. The 'Five Chinas' maintain a shared military but operate independent currencies; crossing from Cantonese-speaking Guangdong to Mandarin-speaking Hebei now requires a passport."
    world_state_effects: {}
  techno_empire:
    status: "DIVERGENCE"
    description: "The 'Jade Net' -- China's AI governance system -- monitors every transaction, conversation, and biometric reading for 950 million citizens in real-time. Dissident author Xu Lianke, writing from exile in Toronto, described it as 'a country where the walls have ears, the streets have eyes, and the air itself keeps score.' GDP growth is 7% annually; protests are statistically zero."
    world_state_effects: {}
  declined:
    status: "DIVERGENCE"
    description: "With a median age of 58 and a workforce that shrank by 300 million in two decades, China's economy contracted for the 11th consecutive year in 2064. The once-gleaming Pudong skyline is dotted with dark towers; real estate blogger Wang Xiaomei's viral series 'Ghost Cities of the East' documented 34 million unoccupied apartments across 200 cities."
    world_state_effects: {}
  regional_hegemon:
    status: "DIVERGENCE"
    description: "China's 'Near Seas Doctrine' formalized what pragmatists had long advocated: absolute dominance from the Kuril Islands to the Strait of Malacca, benign neglect everywhere else. Admiral Zhao Minghua's Pacific Fleet is the world's largest, but Chinese diplomats no longer attend G-20 summits, and Beijing's last African embassy closed in 2063."
    world_state_effects: {}
