id: "2065_china"
year_month: "2065-01"
title: "China 2065"
description: >
  China's population fell below 1 billion in 2063 for the first time since 1980.
  Entire prefectures in Heilongjiang and Gansu have been officially "returned to
  nature," their empty apartment blocks visible from space like geometric fossils.
  Premier-General Zhang Weiming's annual address acknowledged the crisis with a
  phrase that trended globally: "We built cities for our grandchildren, and our
  grandchildren never came."
