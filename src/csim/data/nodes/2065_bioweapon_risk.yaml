id: "2065_bioweapon_risk"
year_month: "2065-01"
title: "Bioweapon Risk"
description: >
  A high-school student in Osaka synthesized a novel influenza variant in her
  garage lab in 2063 using equipment that cost less than a used car. She meant
  it as a science fair project. The pathogen was intercepted by Japan's
  bio-surveillance network 72 hours before it could have reached a train station
  serving 3 million daily commuters.
