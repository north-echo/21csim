      internet_freedom_index: "-0.02"
  global_transparency_wave:
    status: "DIVERGENCE"
    description: "Papers trigger ongoing whistleblower culture and corporate transparency movement"
    explanation: "Success of Panama Papers inspires further leaks and investigative journalism"
    world_state_effects:
